name: 🐛 Bug Report
description: Report a crash, error, or incorrect behavior
labels: ["bug"]
title: "[Bug] "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill out the sections below so we can reproduce and fix it quickly.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: When I click X, the app shows Y instead of Z…
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps that reliably trigger the bug.
      placeholder: |
        1. Open workspace …
        2. Click …
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include error messages, stack traces, or screenshots if available.
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Markon version
      placeholder: e.g. v0.9.0
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS / Platform
      placeholder: e.g. macOS 14.5 (Apple Silicon), Ubuntu 22.04, Windows 11
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Anything else that might help (logs, config, related issues…).
    validations:
      required: false
