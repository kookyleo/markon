name: Promote RC to Stable

on:
  workflow_dispatch:
    inputs:
      rc_tag:
        description: 'RC tag to promote (e.g. v0.9.0-rc.1)'
        required: true

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Derive stable version
        id: ver
        run: |
          RC="${{ github.event.inputs.rc_tag }}"
          STABLE=$(echo "$RC" | sed 's/-rc\.[0-9]*$//')
          echo "rc=$RC" >> "$GITHUB_OUTPUT"
          echo "stable=$STABLE" >> "$GITHUB_OUTPUT"

      - name: Download RC assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/assets
          gh release download "${{ steps.ver.outputs.rc }}" -D /tmp/assets

      - name: Create stable release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STABLE="${{ steps.ver.outputs.stable }}"
          # Filter out RC-specific manifest files
          ASSETS=$(ls /tmp/assets/* | grep -v 'latest.*\.json')
          gh release create "$STABLE" $ASSETS \
            --title "Markon $STABLE" \
            --notes "Promoted from ${{ steps.ver.outputs.rc }}" \
            --latest

      - name: Publish stable updater manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RC="${{ steps.ver.outputs.rc }}"
          STABLE="${{ steps.ver.outputs.stable }}"
          # Download RC manifest from updater release
          gh release download updater -p "latest-rc.json" -D /tmp --clobber
          # Rewrite version and URLs
          jq --arg v "${STABLE#v}" --arg rc "$RC" --arg st "$STABLE" \
            '.version = $v | walk(if type == "string" then gsub($rc; $st) else . end)' \
            /tmp/latest-rc.json > /tmp/latest.json
          gh release upload updater /tmp/latest.json --clobber

      # The Homebrew cask (Casks/markon.rb) and Scoop manifest (bucket/markon.json)
      # live in this repo and double as the personal taps, so they must be
      # committed to main. main is a protected branch and the default
      # GITHUB_TOKEN (github-actions[bot]) cannot bypass it, so these commits
      # are pushed with RELEASE_PUSH_TOKEN — a PAT from an admin account
      # (branch protection has enforce_admins off, so an admin push bypasses
      # the PR / status-check rules). We commit on top of the LATEST main, not
      # the rc tag this job is checked out at: by promote time (≥7 days later)
      # main has usually moved on, so committing on the stale tag would be a
      # non-fast-forward and get rejected.
      - name: Check out latest main for tap updates
        run: |
          git fetch origin main
          git checkout -B main origin/main
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update Homebrew cask
        run: |
          STABLE="${{ steps.ver.outputs.stable }}"
          VER="${STABLE#v}"

          ARM_DMG="/tmp/assets/Markon_${VER}_aarch64.dmg"
          X64_DMG="/tmp/assets/Markon_${VER}_x64.dmg"

          if [ ! -f "$ARM_DMG" ] || [ ! -f "$X64_DMG" ]; then
            echo "::warning::Missing macOS DMG for $VER — skipping cask update"
            ls -la /tmp/assets/ || true
            exit 0
          fi

          ARM_SHA=$(sha256sum "$ARM_DMG" | awk '{print $1}')
          X64_SHA=$(sha256sum "$X64_DMG" | awk '{print $1}')
          echo "arm=$ARM_SHA"
          echo "x64=$X64_SHA"

          python3 - <<PY
          from pathlib import Path
          import re
          p = Path("Casks/markon.rb")
          text = p.read_text()
          text = re.sub(r'version "[^"]*"', f'version "$VER"', text, count=1)
          text = re.sub(r'(sha256 arm:\s+)"[^"]*"', rf'\g<1>"$ARM_SHA"', text, count=1)
          text = re.sub(r'(\s+intel:\s+)"[^"]*"', rf'\g<1>"$X64_SHA"', text, count=1)
          p.write_text(text)
          PY

          git add Casks/markon.rb
          git diff --cached --quiet || git commit -m "cask: bump markon to $VER"

      # Bump bucket/markon.json so `scoop update markon` pulls the new
      # stable. Same tap-in-source pattern as the cask.
      - name: Update Scoop manifest
        run: |
          STABLE="${{ steps.ver.outputs.stable }}"
          VER="${STABLE#v}"

          X64_EXE="/tmp/assets/Markon_${VER}_x64-setup.exe"
          ARM64_EXE="/tmp/assets/Markon_${VER}_arm64-setup.exe"

          if [ ! -f "$X64_EXE" ] || [ ! -f "$ARM64_EXE" ]; then
            echo "::warning::Missing Windows setup.exe for $VER — skipping Scoop update"
            ls -la /tmp/assets/ || true
            exit 0
          fi

          X64_SHA=$(sha256sum "$X64_EXE"   | awk '{print $1}')
          ARM64_SHA=$(sha256sum "$ARM64_EXE" | awk '{print $1}')

          VER="$VER" X64_SHA="$X64_SHA" ARM64_SHA="$ARM64_SHA" python3 - <<'PY'
          import json, os
          from pathlib import Path
          p = Path("bucket/markon.json")
          m = json.loads(p.read_text())
          ver = os.environ["VER"]
          m["version"] = ver
          x64 = m["architecture"]["64bit"]
          arm = m["architecture"]["arm64"]
          x64["url"]  = f"https://github.com/kookyleo/markon/releases/download/v{ver}/Markon_{ver}_x64-setup.exe"
          x64["hash"] = os.environ["X64_SHA"]
          arm["url"]  = f"https://github.com/kookyleo/markon/releases/download/v{ver}/Markon_{ver}_arm64-setup.exe"
          arm["hash"] = os.environ["ARM64_SHA"]
          p.write_text(json.dumps(m, indent=4) + "\n")
          PY

          git add bucket/markon.json
          git diff --cached --quiet || git commit -m "scoop: bump markon to $VER"

      # Single push of whatever the two steps above committed. Uses the admin
      # PAT to bypass branch protection; skips gracefully (no job failure) when
      # the secret isn't configured.
      - name: Push tap updates to main
        env:
          RELEASE_PUSH_TOKEN: ${{ secrets.RELEASE_PUSH_TOKEN }}
        run: |
          if git diff --quiet origin/main HEAD; then
            echo "No cask/Scoop changes to push"
            exit 0
          fi
          if [ -z "$RELEASE_PUSH_TOKEN" ]; then
            echo "::warning::RELEASE_PUSH_TOKEN not set — cask/Scoop commits were not pushed. Add a PAT (admin account, contents:write) as that secret to enable auto-updates."
            exit 0
          fi
          git push "https://x-access-token:${RELEASE_PUSH_TOKEN}@github.com/${{ github.repository }}.git" HEAD:main
          echo "Pushed cask + Scoop updates to main"

  publish-crates:
    needs: promote
    runs-on: ubuntu-latest
    # Skip gracefully when the token isn't configured (fork, first-time setup)
    if: ${{ !cancelled() }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.rc_tag }}

      - name: Install Linux system dependencies
        run: |
          for attempt in 1 2 3; do
            if sudo apt-get update && sudo apt-get install -y --no-install-recommends \
              libwebkit2gtk-4.1-dev \
              libappindicator3-dev \
              librsvg2-dev \
              libfontconfig1-dev \
              pkg-config \
              patchelf; then
              exit 0
            fi
            sudo apt-get clean
            sleep $((attempt * 10))
          done
          exit 1

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend bundle
        # markon-core embeds assets/dist/ (gitignored, produced by npm) via
        # rust_embed. It must exist before cargo packages the crate, otherwise
        # the published tarball ships without it and fails to compile for
        # `cargo install` consumers.
        run: npm ci && npm run build

      - name: Check CARGO_REGISTRY_TOKEN
        id: token
        env:
          TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::CARGO_REGISTRY_TOKEN not set — skipping crates.io publish"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish markon-core
        if: steps.token.outputs.skip != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          GRAPHVIZ_ANYWHERE_ALLOW_DOWNLOAD: "1"
        # Tolerate "already uploaded" when re-running
        run: |
          # --allow-dirty is limited to the generated, gitignored assets/dist
          # bundle produced above and explicitly included in markon-core.
          cargo publish -p markon-core --allow-dirty || {
            code=$?
            if cargo search markon-core --limit 1 | grep -q "^markon-core"; then
              CURRENT=$(cargo search markon-core --limit 1 | head -1 | sed -E 's/.*= "([^"]+)".*/\1/')
              TARGET=$(grep -m1 '^version = "' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
              if [ "$CURRENT" = "$TARGET" ]; then
                echo "markon-core@$TARGET already on crates.io — OK"
                exit 0
              fi
            fi
            exit $code
          }

      - name: Wait for crates.io index propagation
        if: steps.token.outputs.skip != 'true'
        run: sleep 30

      - name: Publish markond (background service)
        if: steps.token.outputs.skip != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # markond is the daemon the `markon` CLI spawns; it must ship next to
          # markon-cli so `cargo install` users get both binaries.
          cargo publish -p markond || {
            code=$?
            if cargo search markond --limit 1 | grep -q "^markond "; then
              CURRENT=$(cargo search markond --limit 1 | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
              TARGET=$(grep -m1 '^version = "' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
              if [ "$CURRENT" = "$TARGET" ]; then
                echo "markond@$TARGET already on crates.io — OK"
                exit 0
              fi
            fi
            exit $code
          }

      - name: Publish markon (CLI)
        if: steps.token.outputs.skip != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p markon-cli || {
            code=$?
            if cargo search markon-cli --limit 1 | grep -q "^markon-cli "; then
              CURRENT=$(cargo search markon-cli --limit 1 | head -1 | sed -E 's/.*= "([^"]+)".*/\1/')
              TARGET=$(grep -m1 '^version = "' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
              if [ "$CURRENT" = "$TARGET" ]; then
                echo "markon-cli@$TARGET already on crates.io — OK"
                exit 0
              fi
            fi
            exit $code
          }
