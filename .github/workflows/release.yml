name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            bundles: dmg,updater
          - platform: ubuntu-22.04
            bundles: deb,appimage,updater
          - platform: windows-latest
            bundles: nsis,updater

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      # Build updater bundle first to capture .tar.gz and .sig before
      # the DMG/AppImage bundler cleans the intermediate files.
      - name: Build updater bundle
        env:
          APPLE_SIGNING_IDENTITY: "-"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          cd crates/gui
          cargo tauri build --bundles updater

      - name: Save updater artifacts
        shell: bash
        run: |
          mkdir -p /tmp/updater-out
          find target/release/bundle -name "*.sig" -o -name "*.tar.gz" -o -name "*.nsis.zip" | while read f; do
            cp "$f" /tmp/updater-out/
            echo "Saved: $f"
          done
          ls -la /tmp/updater-out/

      # Now build installer bundles (dmg/deb/appimage/nsis).
      # This may clean intermediate files but we already saved what we need.
      - name: Build installer bundles
        env:
          APPLE_SIGNING_IDENTITY: "-"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          cd crates/gui
          cargo tauri build --bundles ${{ matrix.bundles }}

      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ github.ref_name }}" >/dev/null 2>&1 || \
          gh release create "${{ github.ref_name }}" \
            --title "Markon ${{ github.ref_name }}" \
            --draft \
            --notes ""

      - name: Upload all artifacts
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          # Upload installer bundles
          for f in target/release/bundle/dmg/*.dmg \
                   target/release/bundle/deb/*.deb \
                   target/release/bundle/appimage/*.AppImage \
                   target/release/bundle/nsis/*-setup.exe; do
            [ -f "$f" ] && gh release upload "$TAG" "$f" --clobber && echo "Uploaded: $f" || true
          done
          # Upload saved updater artifacts
          for f in /tmp/updater-out/*; do
            [ -f "$f" ] && gh release upload "$TAG" "$f" --clobber && echo "Uploaded: $f" || true
          done

  # Collect sig files from the release, build latest.json, publish.
  publish:
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/assets
          gh release download "${{ github.ref_name }}" -D /tmp/assets --clobber
          echo "Downloaded assets:"
          ls -la /tmp/assets/

      - name: Build updater manifest (latest.json)
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          VER="${TAG#v}"
          REPO="https://github.com/kookyleo/markon/releases/download/${TAG}"

          PLATFORMS="{}"
          for sig_file in /tmp/assets/*.sig; do
            [ -f "$sig_file" ] || continue
            bundle="${sig_file%.sig}"
            [ -f "$bundle" ] || continue
            name=$(basename "$bundle")
            sig=$(cat "$sig_file")

            case "$name" in
              *.app.tar.gz)              key="darwin-aarch64" ;;
              *_amd64.AppImage.tar.gz)   key="linux-x86_64" ;;
              *_x64-setup.nsis.zip)      key="windows-x86_64" ;;
              *) echo "Skipping unknown: $name"; continue ;;
            esac

            echo "Adding platform: $key -> $name"
            PLATFORMS=$(echo "$PLATFORMS" | jq \
              --arg k "$key" \
              --arg url "${REPO}/${name}" \
              --arg sig "$sig" \
              '. + {($k): {url: $url, signature: $sig}}')
          done

          jq -n --arg v "$VER" --argjson p "$PLATFORMS" \
            '{version: $v, platforms: $p}' > /tmp/latest.json

          echo "Generated latest.json:"
          cat /tmp/latest.json

      - name: Upload latest.json to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" /tmp/latest.json --clobber

      - name: Determine release type
        id: meta
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == *"-rc."* ]]; then
            echo "is_rc=true" >> "$GITHUB_OUTPUT"
            echo "manifest=latest-rc.json" >> "$GITHUB_OUTPUT"
          else
            echo "is_rc=false" >> "$GITHUB_OUTPUT"
            echo "manifest=latest.json" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          IS_RC="${{ steps.meta.outputs.is_rc }}"
          if [ "$IS_RC" = "true" ]; then
            gh release edit "$TAG" --draft=false --prerelease
          else
            gh release edit "$TAG" --draft=false --prerelease=false --latest
          fi

      - name: Ensure updater release exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view updater >/dev/null 2>&1 || \
          gh release create updater \
            --title "Updater manifests" \
            --notes "Auto-managed release hosting updater JSON manifests. Do not delete." \
            --latest=false

      - name: Copy manifest to updater release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MANIFEST="${{ steps.meta.outputs.manifest }}"
          cp /tmp/latest.json "/tmp/${MANIFEST}"
          gh release upload updater "/tmp/${MANIFEST}" --clobber
