name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            bundles: dmg,updater
          - platform: ubuntu-22.04
            bundles: deb,appimage,updater
          - platform: windows-latest
            bundles: nsis,updater

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Build and upload release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: "-"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: crates/gui
          tagName: ${{ github.ref_name }}
          releaseName: Markon ${{ github.ref_name }}
          releaseDraft: true
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          updaterJsonKeepUniversal: true
          args: --bundles ${{ matrix.bundles }}

  publish:
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Determine release type
        id: meta
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == *"-rc."* ]]; then
            echo "is_rc=true" >> "$GITHUB_OUTPUT"
            echo "manifest=latest-rc.json" >> "$GITHUB_OUTPUT"
          else
            echo "is_rc=false" >> "$GITHUB_OUTPUT"
            echo "manifest=latest.json" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          if [ "${{ steps.meta.outputs.is_rc }}" = "true" ]; then
            gh release edit "$TAG" --draft=false --prerelease
          else
            gh release edit "$TAG" --draft=false --prerelease=false --latest
          fi

      - name: Download updater manifest from release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.ref_name }}" \
            -p "latest.json" -D /tmp --clobber

      - name: Ensure updater release exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view updater >/dev/null 2>&1 || \
          gh release create updater \
            --title "Updater manifests" \
            --notes "Auto-managed release hosting updater JSON manifests." \
            --latest=false

      - name: Copy manifest to updater release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MANIFEST="${{ steps.meta.outputs.manifest }}"
          cp /tmp/latest.json "/tmp/${MANIFEST}"
          gh release upload updater "/tmp/${MANIFEST}" --clobber
