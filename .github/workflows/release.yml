name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.9.0-rc.1)'
        required: true

env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon (arm64)
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --bundles dmg --target aarch64-apple-darwin
            updater_bundle: target/aarch64-apple-darwin/release/bundle/macos/Markon.app
            updater_archive: Markon-aarch64.app.tar.gz
          # macOS Intel (x86_64) — cross-compiled on the arm64 runner because
          # GitHub no longer offers macos-13 as a free standard runner. The
          # macOS SDK on macos-latest supports both architectures natively.
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: --bundles dmg --target x86_64-apple-darwin
            updater_bundle: target/x86_64-apple-darwin/release/bundle/macos/Markon.app
            updater_archive: Markon-x86_64.app.tar.gz
          # Linux x86_64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: --bundles deb,appimage --target x86_64-unknown-linux-gnu
            updater_bundle: target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
            updater_archive: Markon-x86_64.AppImage.tar.gz
          # Linux ARM64
          - platform: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            args: --bundles deb,appimage --target aarch64-unknown-linux-gnu
            updater_bundle: target/aarch64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
            updater_archive: Markon-aarch64.AppImage.tar.gz
          # Windows x86_64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: --bundles nsis --target x86_64-pc-windows-msvc
            updater_bundle: target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe
            updater_archive: Markon-x86_64-setup.nsis.zip
          # Windows ARM64
          - platform: windows-11-arm
            target: aarch64-pc-windows-msvc
            args: --bundles nsis --target aarch64-pc-windows-msvc
            updater_bundle: target/aarch64-pc-windows-msvc/release/bundle/nsis/*-setup.exe
            updater_archive: Markon-aarch64-setup.nsis.zip

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          # Key on target, not platform — two macOS jobs now share the same
          # platform but build for different architectures.
          shared-key: tauri-${{ matrix.target }}

      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install Linux system dependencies
        if: startsWith(matrix.platform, 'ubuntu-')
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libfontconfig1-dev patchelf
          version: 1

      - name: Build installer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: "-"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: crates/gui
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: Markon ${{ env.RELEASE_TAG }}
          releaseDraft: true
          includeUpdaterJson: false
          args: ${{ matrix.args }}

      # Create updater archive + signature ourselves since tauri-action
      # doesn't reliably upload them.
      - name: Create updater archive and sign
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          BUNDLE=$(echo ${{ matrix.updater_bundle }})
          ARCHIVE="/tmp/${{ matrix.updater_archive }}"

          # macOS: .app is cleaned after DMG bundling — extract from DMG
          if [[ "$BUNDLE" == *.app ]] && [ ! -d "$BUNDLE" ]; then
            DMG=$(find target -path "*/release/bundle/dmg/*.dmg" 2>/dev/null | head -1)
            if [ -n "$DMG" ]; then
              echo "Extracting .app from DMG: $DMG"
              hdiutil attach "$DMG" -mountpoint /tmp/dmg-mount -nobrowse -quiet
              APP=$(find /tmp/dmg-mount -maxdepth 1 -name "*.app" | head -1)
              if [ -n "$APP" ]; then
                mkdir -p "$(dirname "$BUNDLE")"
                cp -R "$APP" "$BUNDLE"
              fi
              hdiutil detach /tmp/dmg-mount -quiet || true
            fi
          fi

          if [ ! -e "$BUNDLE" ]; then
            echo "Bundle not found: $BUNDLE — skipping updater archive"
            exit 0
          fi

          echo "Creating archive from: $BUNDLE"
          if [[ "$BUNDLE" == *.app ]]; then
            tar czf "$ARCHIVE" -C "$(dirname "$BUNDLE")" "$(basename "$BUNDLE")"
          elif [[ "$BUNDLE" == *.exe ]]; then
            cd "$(dirname "$BUNDLE")"
            # Store the .exe uncompressed (method=Copy). tauri-plugin-updater
            # 2.9.0 declares its zip dependency with `default-features = false`
            # (see its Cargo.toml), which disables the deflate feature — the
            # client zip reader can only decode Stored entries. Using Deflate
            # (or Deflate64) makes it fail with "unsupported Zip archive:
            # Compression method not supported". NSIS payloads are already
            # compressed internally, so Deflate saved < 0.3% anyway.
            7z a -tzip -mm=Copy "$ARCHIVE" "$(basename "$BUNDLE")"
          else
            tar czf "$ARCHIVE" -C "$(dirname "$BUNDLE")" "$(basename "$BUNDLE")"
          fi

          echo "Signing: $ARCHIVE"
          # Try binstall first for speed, but verify cargo-tauri is actually
          # on PATH afterwards — a cached registry entry can make binstall
          # report "already installed" without the binary actually being
          # deployed into $CARGO_HOME/bin. Fall back to `cargo install` when
          # the binary is missing, regardless of binstall's exit code.
          cargo binstall tauri-cli --no-confirm 2>/dev/null || true
          command -v cargo-tauri >/dev/null 2>&1 || cargo install tauri-cli --version "^2" --locked
          cargo tauri signer sign -k "$TAURI_SIGNING_PRIVATE_KEY" -p "" "$ARCHIVE"

          echo "Created:"
          ls -la "$ARCHIVE" "${ARCHIVE}.sig"

      - name: Upload updater artifacts
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          ARCHIVE="/tmp/${{ matrix.updater_archive }}"
          if [ -f "$ARCHIVE" ]; then
            gh release upload "$TAG" "$ARCHIVE" --clobber && echo "Uploaded: $ARCHIVE"
            gh release upload "$TAG" "${ARCHIVE}.sig" --clobber && echo "Uploaded: ${ARCHIVE}.sig"
          else
            echo "No updater archive to upload (platform may have failed)"
          fi

  publish:
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Determine release type
        id: meta
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          if [[ "$TAG" == *"-rc."* ]]; then
            echo "is_rc=true" >> "$GITHUB_OUTPUT"
            echo "manifest=latest-rc.json" >> "$GITHUB_OUTPUT"
          else
            echo "is_rc=false" >> "$GITHUB_OUTPUT"
            echo "manifest=latest.json" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          if [ "${{ steps.meta.outputs.is_rc }}" = "true" ]; then
            gh release edit "$TAG" --draft=false --prerelease
          else
            gh release edit "$TAG" --draft=false --prerelease=false --latest
          fi

      - name: Build updater manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          VER="${TAG#v}"
          REPO="https://github.com/kookyleo/markon/releases/download/${TAG}"

          mkdir -p /tmp/assets
          gh release download "$TAG" -D /tmp/assets --clobber
          echo "Assets:" && ls /tmp/assets/

          PLATFORMS="{}"
          for sig_file in /tmp/assets/*.sig; do
            [ -f "$sig_file" ] || continue
            bundle="${sig_file%.sig}"
            [ -f "$bundle" ] || continue
            name=$(basename "$bundle")
            sig=$(cat "$sig_file")

            case "$name" in
              *aarch64*.app.tar.gz)        key="darwin-aarch64" ;;
              *x86_64*.app.tar.gz)         key="darwin-x86_64" ;;
              *aarch64*.AppImage.tar.gz)   key="linux-aarch64" ;;
              *x86_64*.AppImage.tar.gz)    key="linux-x86_64" ;;
              *aarch64*setup.nsis.zip)     key="windows-aarch64" ;;
              *x86_64*setup.nsis.zip)      key="windows-x86_64" ;;
              *) echo "Skip: $name"; continue ;;
            esac

            echo "Platform: $key -> $name"
            PLATFORMS=$(echo "$PLATFORMS" | jq \
              --arg k "$key" \
              --arg url "${REPO}/${name}" \
              --arg sig "$sig" \
              '. + {($k): {url: $url, signature: $sig}}')
          done

          jq -n --arg v "$VER" --argjson p "$PLATFORMS" \
            '{version: $v, platforms: $p}' > /tmp/latest.json
          echo "Manifest:" && cat /tmp/latest.json

      - name: Upload manifest to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ env.RELEASE_TAG }}" /tmp/latest.json --clobber

      - name: Ensure updater release exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view updater >/dev/null 2>&1 || \
          gh release create updater \
            --title "Updater manifests" \
            --notes "Auto-managed release hosting updater JSON manifests." \
            --latest=false

      - name: Copy manifest to updater release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MANIFEST="${{ steps.meta.outputs.manifest }}"
          cp /tmp/latest.json "/tmp/${MANIFEST}"
          gh release upload updater "/tmp/${MANIFEST}" --clobber
