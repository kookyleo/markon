name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            bundles: dmg,updater
            updater_glob: target/release/bundle/macos/*.tar.gz*
          - platform: ubuntu-22.04
            bundles: deb,appimage,updater
            updater_glob: target/release/bundle/appimage/*.tar.gz*
          - platform: windows-latest
            bundles: nsis,updater
            updater_glob: target/release/bundle/nsis/*.nsis.zip*

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Build and upload release
        uses: tauri-apps/tauri-action@v0.5.16
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: "-"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: crates/gui
          tagName: ${{ github.ref_name }}
          releaseName: Markon ${{ github.ref_name }}
          releaseDraft: true
          includeUpdaterJson: false
          args: --bundles ${{ matrix.bundles }}

      # Upload updater artifacts (.tar.gz + .sig, or .nsis.zip + .sig)
      # so the publish job can assemble latest.json from all platforms.
      - name: Upload updater artifacts
        uses: actions/upload-artifact@v4
        with:
          name: updater-${{ matrix.platform }}
          path: ${{ matrix.updater_glob }}
          if-no-files-found: warn

  # Collect updater artifacts, build latest.json, publish the release.
  publish:
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all updater artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/updater
          merge-multiple: true

      - name: Upload updater bundles to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          for f in /tmp/updater/*; do
            [ -f "$f" ] && gh release upload "$TAG" "$f" --clobber || true
          done

      - name: Build updater manifest (latest.json)
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          VER="${TAG#v}"
          REPO="https://github.com/kookyleo/markon/releases/download/${TAG}"

          # Collect platform entries
          PLATFORMS="{}"
          for sig_file in /tmp/updater/*.sig; do
            [ -f "$sig_file" ] || continue
            bundle="${sig_file%.sig}"
            name=$(basename "$bundle")
            sig=$(cat "$sig_file")

            # Determine platform key from filename
            case "$name" in
              *.app.tar.gz)       key="darwin-aarch64" ;;
              *_amd64.AppImage.tar.gz) key="linux-x86_64" ;;
              *_x64-setup.nsis.zip)    key="windows-x86_64" ;;
              *) continue ;;
            esac

            PLATFORMS=$(echo "$PLATFORMS" | jq \
              --arg k "$key" \
              --arg url "${REPO}/${name}" \
              --arg sig "$sig" \
              '. + {($k): {url: $url, signature: $sig}}')
          done

          jq -n --arg v "$VER" --argjson p "$PLATFORMS" \
            '{version: $v, platforms: $p}' > /tmp/latest.json

          echo "Generated latest.json:"
          cat /tmp/latest.json

      - name: Upload latest.json to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" /tmp/latest.json --clobber

      - name: Determine release type
        id: meta
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == *"-rc."* ]]; then
            echo "is_rc=true" >> "$GITHUB_OUTPUT"
            echo "manifest=latest-rc.json" >> "$GITHUB_OUTPUT"
          else
            echo "is_rc=false" >> "$GITHUB_OUTPUT"
            echo "manifest=latest.json" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          IS_RC="${{ steps.meta.outputs.is_rc }}"
          if [ "$IS_RC" = "true" ]; then
            gh release edit "$TAG" --draft=false --prerelease
          else
            gh release edit "$TAG" --draft=false --prerelease=false --latest
          fi

      - name: Ensure updater release exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view updater >/dev/null 2>&1 || \
          gh release create updater \
            --title "Updater manifests" \
            --notes "Auto-managed release hosting updater JSON manifests. Do not delete." \
            --latest=false

      - name: Copy manifest to updater release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MANIFEST="${{ steps.meta.outputs.manifest }}"
          cp /tmp/latest.json "/tmp/${MANIFEST}"
          gh release upload updater "/tmp/${MANIFEST}" --clobber
