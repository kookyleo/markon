name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.9.0-rc.1)'
        required: true

env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
  # Route rustc through sccache, backed by the GHA cache service. This
  # shares compiled crate artefacts across all matrix jobs (and across
  # successive RC runs), so the second time a given (crate, target,
  # flags) tuple is seen the object files come straight from cache.
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"
  # Incremental + sccache don't compose cleanly; release builds default
  # to incremental=0 anyway, set it explicitly for clarity.
  CARGO_INCREMENTAL: "0"
  # GitHub-hosted Linux runners do not consistently expose FUSE to AppImage
  # helpers. Let linuxdeploy AppImages self-extract instead of mounting.
  APPIMAGE_EXTRACT_AND_RUN: "1"
  # linuxdeploy strips binaries by default while building AppImages. Tauri
  # patches a bundle-type marker into the executable before bundling; keep that
  # marker intact through AppImage packaging.
  NO_STRIP: "true"
  # Release builds must be able to fetch graphviz-anywhere native assets when
  # no checked-in prebuilt library exists for the target.
  GRAPHVIZ_ANYWHERE_ALLOW_DOWNLOAD: "1"

jobs:
  # Create the GitHub release ONCE, up front. The 6-way build matrix then
  # uploads into this single release via releaseId. Previously each matrix job
  # ran tauri-action with releaseDraft:true and created its own release — two
  # jobs could race and create two releases for the same tag, splitting the
  # build artifacts across them (installers on one, updater archives on the
  # other) and leaving an orphan draft. Creating it here removes that race.
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - name: Create or reuse the draft release
        id: create
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          # Match by tag across ALL releases (the /releases/tags endpoint hides
          # drafts, so a re-run after a failed build would otherwise create a
          # second draft). Reuse if found, else create one draft.
          id=$(gh api "repos/${{ github.repository }}/releases" --paginate \
            -q "[.[] | select(.tag_name==\"$TAG\")] | .[0].id // empty")
          if [ -z "$id" ]; then
            id=$(gh api -X POST "repos/${{ github.repository }}/releases" \
              -f tag_name="$TAG" -f name="Markon $TAG" -F draft=true -q '.id')
            echo "Created draft release $id for $TAG"
          else
            echo "Reusing existing release $id for $TAG"
          fi
          echo "release_id=$id" >> "$GITHUB_OUTPUT"

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon (arm64)
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --bundles dmg --target aarch64-apple-darwin
            updater_bundle: target/aarch64-apple-darwin/release/bundle/macos/Markon.app
            updater_archive: Markon-aarch64.app.tar.gz
          # macOS Intel (x86_64) — cross-compiled on the arm64 runner because
          # GitHub no longer offers macos-13 as a free standard runner. The
          # macOS SDK on macos-latest supports both architectures natively.
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: --bundles dmg --target x86_64-apple-darwin
            updater_bundle: target/x86_64-apple-darwin/release/bundle/macos/Markon.app
            updater_archive: Markon-x86_64.app.tar.gz
          # Windows bundles have no updater_archive — we sign the raw
          # *-setup.exe in place (plugins-workspace#1521). The matrix rows
          # below keep updater_archive empty for Windows entries.
          # Linux x86_64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: --bundles deb,appimage --target x86_64-unknown-linux-gnu
            updater_bundle: target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
            updater_archive: Markon-x86_64.AppImage.tar.gz
          # Linux ARM64
          - platform: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            args: --bundles deb,appimage --target aarch64-unknown-linux-gnu
            updater_bundle: target/aarch64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
            updater_archive: Markon-aarch64.AppImage.tar.gz
          # Windows x86_64 — updater signs raw .exe (no zip wrapper).
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: --bundles nsis --target x86_64-pc-windows-msvc
            updater_bundle: target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe
            updater_archive: ""
          # Windows ARM64 — updater signs raw .exe (no zip wrapper).
          - platform: windows-11-arm
            target: aarch64-pc-windows-msvc
            args: --bundles nsis --target aarch64-pc-windows-msvc
            updater_bundle: target/aarch64-pc-windows-msvc/release/bundle/nsis/*-setup.exe
            updater_archive: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          # Key on target, not platform — two macOS jobs now share the same
          # platform but build for different architectures. Kept alongside
          # sccache: rust-cache preserves the registry index / git db /
          # target dir within a job; sccache shares compile outputs across
          # jobs. They're complementary, not redundant.
          shared-key: tauri-${{ matrix.target }}

      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install Linux system dependencies
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          for attempt in 1 2 3; do
            if sudo apt-get update && sudo apt-get install -y --no-install-recommends \
              libwebkit2gtk-4.1-dev \
              libappindicator3-dev \
              librsvg2-dev \
              libfontconfig1-dev \
              libfuse2 \
              pkg-config \
              patchelf; then
              exit 0
            fi
            sudo apt-get clean
            sleep $((attempt * 10))
          done
          exit 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend assets
        shell: bash
        run: npm install && npm run build

      # The upstream v0.2.3 graphviz-anywhere release does not ship a
      # windows-arm64 native asset. Build it on the native ARM runner and point
      # the Rust build script at that local output directory.
      - name: Install Windows ARM Graphviz build dependencies
        if: matrix.target == 'aarch64-pc-windows-msvc'
        shell: powershell
        run: |
          choco install winflexbison3 -y --no-progress
          "C:\ProgramData\chocolatey\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build Graphviz native runtime for Windows ARM64
        if: matrix.target == 'aarch64-pc-windows-msvc'
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 --branch v0.2.3 --recurse-submodules --shallow-submodules https://github.com/Actrium/supramark.git /tmp/supramark-graphviz
          cd /tmp/supramark-graphviz/crates/graphviz-anywhere
          BISON_EXE="$(command -v win_bison.exe || command -v bison || true)"
          FLEX_EXE="$(command -v win_flex.exe || command -v flex || true)"
          if [ -z "$BISON_EXE" ] || [ -z "$FLEX_EXE" ]; then
            echo "Bison/Flex not found after winflexbison3 install"
            exit 1
          fi
          BISON_EXE="$(cygpath -m "$BISON_EXE")"
          FLEX_EXE="$(cygpath -m "$FLEX_EXE")"
          export BISON_EXE
          export FLEX_EXE
          python3 - <<'PY'
          import os
          from pathlib import Path

          path = Path("scripts/common.sh")
          text = path.read_text()
          extra = (
              "    -DCMAKE_DISABLE_FIND_PACKAGE_GD=TRUE\n"
              f"    -DBISON_EXECUTABLE={os.environ['BISON_EXE']}\n"
              f"    -DFLEX_EXECUTABLE={os.environ['FLEX_EXE']}\n"
          )
          if "-DCMAKE_DISABLE_FIND_PACKAGE_GD=TRUE" not in text:
              text = text.replace(
                  "    -DCMAKE_DISABLE_FIND_PACKAGE_ANN=TRUE\n",
                  "    -DCMAKE_DISABLE_FIND_PACKAGE_ANN=TRUE\n"
                  f"{extra}",
              )
              path.write_text(text)
          PY
          ./scripts/build-windows.sh --arch arm64
          native_dir="$(cygpath -m "$(pwd)/output/windows-arm64")"
          echo "GRAPHVIZ_ANYWHERE_DIR=${native_dir}" >> "$GITHUB_ENV"
          echo "Using local Graphviz native runtime: ${native_dir}"

      - name: Build installer
        if: ${{ !startsWith(matrix.platform, 'ubuntu-') }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: "-"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: crates/gui
          # Upload into the single release pre-created by create-release —
          # do NOT let the matrix create releases itself (that races).
          releaseId: ${{ needs.create-release.outputs.release_id }}
          includeUpdaterJson: false
          args: ${{ matrix.args }}

      - name: Build Linux installer
        if: startsWith(matrix.platform, 'ubuntu-')
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          npm install -g @tauri-apps/cli@v2
          cd crates/gui
          tauri --verbose build --no-bundle --target ${{ matrix.target }}
          graphviz_lib="$(
            find "../../target/${{ matrix.target }}/release/build" "../../target/release/build" \
              -name libgraphviz_api.so -type f -print -quit
          )"
          if [ -z "$graphviz_lib" ]; then
            echo "Unable to locate graphviz-anywhere native runtime after no-bundle build"
            exit 1
          fi
          export LD_LIBRARY_PATH="$(dirname "$graphviz_lib"):${LD_LIBRARY_PATH:-}"
          echo "Using Graphviz runtime for linuxdeploy: $graphviz_lib"
          tauri --verbose build ${{ matrix.args }}

      - name: Upload Linux installer artifacts
        if: startsWith(matrix.platform, 'ubuntu-')
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ env.RELEASE_TAG }}"
          mapfile -d '' artifacts < <(find "target/${{ matrix.target }}/release/bundle" \
            -type f \( -name '*.deb' -o -name '*.AppImage' \) -print0)
          if [ "${#artifacts[@]}" -eq 0 ]; then
            echo "No Linux installer artifacts found"
            exit 1
          fi
          for artifact in "${artifacts[@]}"; do
            gh release upload "$TAG" "$artifact" --clobber
            echo "Uploaded: $(basename "$artifact")"
          done

      # tauri-action uploads the DMG before we can mutate the .app bundle.
      # The Graphviz runtime dylib is required at process launch, so patch the
      # generated macOS app, rebuild the DMG under the same filename, and
      # replace the uploaded release asset. The local build-dmg.sh script does
      # this before creating its DMG; this step keeps release builds equivalent.
      - name: Bundle Graphviz dylib into macOS DMG
        if: contains(matrix.target, 'apple-darwin')
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: "-"
        run: |
          set -euo pipefail

          TAG="${{ env.RELEASE_TAG }}"
          TARGET="${{ matrix.target }}"
          APP_BUNDLE="target/$TARGET/release/bundle/macos/Markon.app"
          DMG=$(find "target/$TARGET/release/bundle/dmg" -maxdepth 1 -name "*.dmg" -type f | head -1)

          if [ -z "$DMG" ]; then
            echo "No macOS DMG found for $TARGET"
            exit 1
          fi

          WORK_DIR=$(mktemp -d)
          MOUNT_DIR="$WORK_DIR/mount"
          VERIFY_DIR="$WORK_DIR/verify"
          PATCH_DIR="$WORK_DIR/app"
          DMG_ROOT="$WORK_DIR/dmg-root"
          NEW_DMG="$WORK_DIR/$(basename "$DMG")"
          mkdir -p "$PATCH_DIR" "$DMG_ROOT"

          cleanup_mounts() {
            if mount | grep -q "on $MOUNT_DIR "; then
              hdiutil detach "$MOUNT_DIR" -quiet || true
            fi
            if mount | grep -q "on $VERIFY_DIR "; then
              hdiutil detach "$VERIFY_DIR" -quiet || true
            fi
          }
          trap cleanup_mounts EXIT

          if [ -d "$APP_BUNDLE" ]; then
            cp -R "$APP_BUNDLE" "$PATCH_DIR/"
          else
            mkdir -p "$MOUNT_DIR"
            hdiutil attach "$DMG" -mountpoint "$MOUNT_DIR" -nobrowse -quiet
            SRC_APP=$(find "$MOUNT_DIR" -maxdepth 1 -name "*.app" -type d | head -1)
            if [ -z "$SRC_APP" ]; then
              echo "No .app bundle found inside $DMG"
              exit 1
            fi
            cp -R "$SRC_APP" "$PATCH_DIR/"
            hdiutil detach "$MOUNT_DIR" -quiet
          fi

          PATCHED_APP=$(find "$PATCH_DIR" -maxdepth 1 -name "*.app" -type d | head -1)
          if [ -z "$PATCHED_APP" ]; then
            echo "No .app bundle available for Graphviz patching"
            exit 1
          fi

          scripts/macos-bundle-graphviz.sh "$PATCHED_APP" "$TARGET"

          rm -rf "$(dirname "$APP_BUNDLE")"
          mkdir -p "$(dirname "$APP_BUNDLE")"
          cp -R "$PATCHED_APP" "$APP_BUNDLE"

          cp -R "$PATCHED_APP" "$DMG_ROOT/"
          ln -s /Applications "$DMG_ROOT/Applications"
          hdiutil create -volname "Markon" -srcfolder "$DMG_ROOT" -ov -format UDZO -fs HFS+ "$NEW_DMG"
          cp "$NEW_DMG" "$DMG"

          mkdir -p "$VERIFY_DIR"
          hdiutil attach "$DMG" -mountpoint "$VERIFY_DIR" -nobrowse -quiet
          VERIFY_APP=$(find "$VERIFY_DIR" -maxdepth 1 -name "*.app" -type d | head -1)
          test -f "$VERIFY_APP/Contents/Frameworks/libgraphviz_api.dylib"
          hdiutil detach "$VERIFY_DIR" -quiet

          gh release upload "$TAG" "$DMG" --clobber
          echo "Replaced macOS DMG with Graphviz-bundled app: $(basename "$DMG")"

      # tauri-bundler names the AppImage with mixed arch styles: x86_64 ->
      # `amd64` (Debian) but aarch64 stays `aarch64` (GNU). Rename the ARM
      # build to `arm64` so all four Linux artifacts (.deb + .AppImage) share
      # the Debian convention amd64/arm64. The raw .AppImage is download-only
      # — the updater manifest uses the separate `*.AppImage.tar.gz` archives,
      # so this rename touches nothing downstream.
      - name: Normalize AppImage arch name (aarch64 -> arm64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          SRC=$(find target/aarch64-unknown-linux-gnu/release/bundle/appimage \
                  -maxdepth 1 -name '*aarch64.AppImage' | head -1)
          if [ -z "$SRC" ]; then
            echo "No aarch64 AppImage found — nothing to rename"
            exit 0
          fi
          OLD=$(basename "$SRC")
          NEW="${OLD/aarch64.AppImage/arm64.AppImage}"
          cp "$SRC" "$(dirname "$SRC")/$NEW"
          gh release upload "$TAG" "$(dirname "$SRC")/$NEW" --clobber
          gh release delete-asset "$TAG" "$OLD" --yes || true
          rm -f "$SRC"
          echo "Renamed release asset: $OLD -> $NEW"

      # Create updater signature ourselves since tauri-action doesn't
      # reliably upload them.
      #
      # macOS / Linux wrap in .tar.gz then sign the archive. Windows ships
      # the raw .exe — tauri-plugin-updater 2.9.0 hard-codes
      # `default-features = false` on its zip dep so Deflate can't be read
      # (see plugins-workspace#1329). Raw exe is the intended path per
      # plugins-workspace#1521 and works for both current and 0.9.1 clients.
      - name: Create updater archive and sign
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          BUNDLE=$(echo ${{ matrix.updater_bundle }})

          # macOS: .app is cleaned after DMG bundling — extract from DMG
          if [[ "$BUNDLE" == *.app ]] && [ ! -d "$BUNDLE" ]; then
            DMG=$(find target -path "*/release/bundle/dmg/*.dmg" 2>/dev/null | head -1)
            if [ -n "$DMG" ]; then
              echo "Extracting .app from DMG: $DMG"
              hdiutil attach "$DMG" -mountpoint /tmp/dmg-mount -nobrowse -quiet
              APP=$(find /tmp/dmg-mount -maxdepth 1 -name "*.app" | head -1)
              if [ -n "$APP" ]; then
                mkdir -p "$(dirname "$BUNDLE")"
                cp -R "$APP" "$BUNDLE"
              fi
              hdiutil detach /tmp/dmg-mount -quiet || true
            fi
          fi

          if [ ! -e "$BUNDLE" ]; then
            echo "Bundle not found: $BUNDLE — skipping updater archive"
            exit 0
          fi

          # Install cargo-tauri once — prefer binstall, fall back to source
          # build if the binary isn't on PATH afterwards.
          cargo binstall tauri-cli --no-confirm 2>/dev/null || true
          command -v cargo-tauri >/dev/null 2>&1 || cargo install tauri-cli --version "^2" --locked

          if [[ "$BUNDLE" == *.exe ]]; then
            # Windows: sign the raw installer. The .exe itself is already
            # uploaded to the release by tauri-action, so we only push the
            # new .sig.
            echo "Signing raw installer: $BUNDLE"
            cargo tauri signer sign -k "$TAURI_SIGNING_PRIVATE_KEY" -p "" "$BUNDLE"
            gh release upload "$TAG" "${BUNDLE}.sig" --clobber
            echo "Uploaded: ${BUNDLE}.sig"
          else
            # macOS / Linux: wrap in tar.gz, sign the archive, upload both.
            ARCHIVE="/tmp/${{ matrix.updater_archive }}"
            echo "Creating archive from: $BUNDLE"
            tar czf "$ARCHIVE" -C "$(dirname "$BUNDLE")" "$(basename "$BUNDLE")"
            echo "Signing: $ARCHIVE"
            cargo tauri signer sign -k "$TAURI_SIGNING_PRIVATE_KEY" -p "" "$ARCHIVE"
            gh release upload "$TAG" "$ARCHIVE" --clobber
            gh release upload "$TAG" "${ARCHIVE}.sig" --clobber
            echo "Uploaded: $ARCHIVE (+ .sig)"
          fi

  publish:
    needs: build
    if: ${{ success() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Determine release type
        id: meta
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          if [[ "$TAG" == *"-rc."* ]]; then
            echo "is_rc=true" >> "$GITHUB_OUTPUT"
            echo "manifest=latest-rc.json" >> "$GITHUB_OUTPUT"
          else
            echo "is_rc=false" >> "$GITHUB_OUTPUT"
            echo "manifest=latest.json" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          if [ "${{ steps.meta.outputs.is_rc }}" = "true" ]; then
            gh release edit "$TAG" --draft=false --prerelease
          else
            gh release edit "$TAG" --draft=false --prerelease=false --latest
          fi

      - name: Build updater manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          VER="${TAG#v}"
          REPO="https://github.com/kookyleo/markon/releases/download/${TAG}"

          mkdir -p /tmp/assets
          gh release download "$TAG" -D /tmp/assets --clobber
          echo "Assets:" && ls /tmp/assets/

          PLATFORMS="{}"
          for sig_file in /tmp/assets/*.sig; do
            [ -f "$sig_file" ] || continue
            bundle="${sig_file%.sig}"
            [ -f "$bundle" ] || continue
            name=$(basename "$bundle")
            sig=$(cat "$sig_file")

            case "$name" in
              *aarch64*.app.tar.gz)        key="darwin-aarch64" ;;
              *x86_64*.app.tar.gz)         key="darwin-x86_64" ;;
              *aarch64*.AppImage.tar.gz)   key="linux-aarch64" ;;
              *x86_64*.AppImage.tar.gz)    key="linux-x86_64" ;;
              *arm64-setup.exe)            key="windows-aarch64" ;;
              *x64-setup.exe)              key="windows-x86_64" ;;
              *) echo "Skip: $name"; continue ;;
            esac

            echo "Platform: $key -> $name"
            PLATFORMS=$(echo "$PLATFORMS" | jq \
              --arg k "$key" \
              --arg url "${REPO}/${name}" \
              --arg sig "$sig" \
              '. + {($k): {url: $url, signature: $sig}}')
          done

          jq -n --arg v "$VER" --argjson p "$PLATFORMS" \
            '{version: $v, platforms: $p}' > /tmp/latest.json
          echo "Manifest:" && cat /tmp/latest.json

      - name: Upload manifest to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ env.RELEASE_TAG }}" /tmp/latest.json --clobber

      - name: Ensure updater release exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view updater >/dev/null 2>&1 || \
          gh release create updater \
            --title "Updater manifests" \
            --notes "Auto-managed release hosting updater JSON manifests." \
            --latest=false

      - name: Copy manifest to updater release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MANIFEST="${{ steps.meta.outputs.manifest }}"
          mkdir -p /tmp/updater-manifest
          cp /tmp/latest.json "/tmp/updater-manifest/${MANIFEST}"
          gh release upload updater "/tmp/updater-manifest/${MANIFEST}" --clobber

      - name: Update Homebrew Cask
        if: steps.meta.outputs.is_rc == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          VER="${TAG#v}"

          # 1. Download DMGs to calculate SHA256
          mkdir -p /tmp/cask
          gh release download "$TAG" -p "*.dmg" -D /tmp/cask --clobber

          # 2. Calculate SHAs for both architectures
          SHA_ARM=$(shasum -a 256 /tmp/cask/*_aarch64.dmg | awk '{print $1}')
          SHA_INTEL=$(shasum -a 256 /tmp/cask/*_x64.dmg | awk '{print $1}')

          echo "Updating Cask to version $VER"
          echo "ARM SHA: $SHA_ARM"
          echo "Intel SHA: $SHA_INTEL"

          # The release job checks out the tag so builds are reproducible, but
          # the cask file lives on main. Switch to main before committing the
          # generated cask update.
          git fetch origin main
          git switch -C cask-update origin/main

          # 3. Update Casks/markon.rb using python for precision
          export VER SHA_ARM SHA_INTEL
          python3 - <<'PY'
          import os
          import re

          ver = os.environ["VER"]
          sha_arm = os.environ["SHA_ARM"]
          sha_intel = os.environ["SHA_INTEL"]
          path = 'Casks/markon.rb'
          with open(path, 'r') as f:
              content = f.read()

          content = re.sub(r'version ".*?"', f'version "{ver}"', content)
          content = re.sub(r'sha256 arm:\s+".*?"', f'sha256 arm:   "{sha_arm}"', content)
          content = re.sub(r'intel:\s+".*?"', f'intel: "{sha_intel}"', content)

          with open(path, 'w') as f:
              f.write(content)
          PY

          # 4. Commit and push back to main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/markon.rb
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update cask to $TAG [skip ci]"
            git push origin HEAD:main
          fi
