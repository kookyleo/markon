name: Auto RC

on:
  push:
    branches: [main]
    paths: ['Cargo.toml']

jobs:
  tag-rc:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need the full push range, not just HEAD~1

      - name: Detect version change
        id: ver
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          NEW=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          # Compare against the tip before this push (`github.event.before`),
          # not just HEAD~1, so a bump commit that isn't the last commit in
          # the push still registers. Fall back to HEAD~1 when BEFORE is a
          # zero SHA (branch creation / initial push).
          ZERO="0000000000000000000000000000000000000000"
          if [ -n "$BEFORE" ] && [ "$BEFORE" != "$ZERO" ]; then
            OLD=$(git show "$BEFORE:Cargo.toml" 2>/dev/null | grep -m1 '^version' | sed 's/.*"\(.*\)"/\1/' || echo "")
          else
            OLD=$(git show HEAD~1:Cargo.toml 2>/dev/null | grep -m1 '^version' | sed 's/.*"\(.*\)"/\1/' || echo "")
          fi
          echo "old=$OLD" >> "$GITHUB_OUTPUT"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          if [ "$NEW" != "$OLD" ] && [ -n "$NEW" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine RC number
        if: steps.ver.outputs.changed == 'true'
        id: rc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER="${{ steps.ver.outputs.new }}"
          # Find existing rc tags for this version
          LAST=$(gh release list --limit 100 --json tagName -q \
            "[.[].tagName | select(startswith(\"v${VER}-rc.\"))] | sort | last // empty")
          if [ -n "$LAST" ]; then
            N=$(echo "$LAST" | grep -o 'rc\.[0-9]*' | grep -o '[0-9]*')
            NEXT=$((N + 1))
          else
            NEXT=1
          fi
          TAG="v${VER}-rc.${NEXT}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Tagging: $TAG"

      - name: Create and push tag
        if: steps.ver.outputs.changed == 'true'
        run: |
          TAG="${{ steps.rc.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Trigger release workflow
        if: steps.ver.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run release.yml -f tag="${{ steps.rc.outputs.tag }}"
