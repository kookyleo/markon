# Markon brand asset manifest.
#
# Single source of truth: assets/brand/glyph.svg (32x32 viewBox, currentColor).
# All downstream icons are generated by `cargo xtask icons` from this manifest.
# CI runs `cargo xtask icons --check` to catch drift.
#
# Geometry: wrapped variants render in 512x512 with the glyph centered inside
# a rounded square. The wrap parameters mirror Apple/Google launcher icon
# guidelines (~88px corner radius, ~32px outer margin on a 512 canvas).

[wrap.rounded]
canvas = 512
margin = 32       # gap between canvas edge and wrapper rect
radius = 88       # wrapper corner radius


# ── App icon ────────────────────────────────────────────────────────────────
# Black glyph on white rounded square. Used for: Tauri bundle (all platforms),
# in-app About page, HTTP server favicon, docs site favicon.
[[variant]]
name = "app"
wrap = "rounded"
fg = "#000000"
bg = "#ffffff"

# Tauri bundle icons (paths listed in crates/gui/tauri.conf.json).
outputs = [
  { path = "crates/gui/icons/icon.svg" },
  { path = "crates/gui/icons/icon.png", size = 512 },
  { path = "crates/gui/icons/32x32.png",  size = 32 },
  { path = "crates/gui/icons/128x128.png", size = 128 },
  { path = "crates/gui/icons/256x256.png", size = 256 },
  { path = "crates/gui/icons/512x512.png", size = 512 },
  # icon.ico moved to the bare-glyph variant below — see note there.
  { path = "crates/gui/icons/icon.icns",  sizes = [16, 32, 64, 128, 256, 512, 1024] },
  # HTTP server favicon (rust-embed: crates/core/assets/icons/).
  { path = "crates/core/assets/icons/favicon.svg" },
  # Docs site (VitePress public/).
  { path = "docs/public/favicon.png", size = 256 },
]

# ── Tray icon (Windows / Linux) — accent-coloured ───────────────────────────
# Windows has no template-image auto-tint; a monochrome glyph blends into
# either taskbar theme. Use the app's accent blue (matches the About page
# --accent) behind a white glyph — vivid enough to pop on both light and
# dark taskbars without needing two variants.
[[variant]]
name = "tray-accent"
wrap = "rounded"
fg = "#ffffff"
bg = "#0A84FF"
outputs = [
  { path = "crates/gui/icons/tray-colored.png", size = 64 },
]

# ── Tray icon (macOS template) ──────────────────────────────────────────────
# Bare glyph, transparent background. macOS auto-tints template images
# against the menu bar so the source colour does not matter — alpha does.
# We render in white so the SVG itself is legible on dark backgrounds.
[[variant]]
name = "tray-template"
wrap = "none"
fg = "#ffffff"
outputs = [
  { path = "crates/gui/icons/tray.svg" },
  { path = "crates/gui/icons/tray.png", size = 64 },
  # In-app About page (CSS mask — fill colour is irrelevant, alpha is used).
  { path = "crates/gui/ui/glyph.svg" },
  # Docs site logo, dark-theme variant (white glyph on dark page).
  { path = "docs/public/logo-dark.svg" },
]

# ── Bare glyph, dark (docs light-theme logo) ────────────────────────────────
# The Windows / Linux tray icon used to come from this variant. It's moved
# to the wrapped `app` variant above — a flat black glyph was nearly
# invisible on Windows 11's dark taskbar and looked weak on any taskbar
# without the auto-tint macOS provides.
[[variant]]
name = "glyph-dark"
wrap = "none"
fg = "#000000"
outputs = [
  # Docs site logo, light-theme variant (black glyph on light page).
  { path = "docs/public/logo-light.svg" },
  # Windows resource icon (embedded in the .exe — titlebar, Start Menu,
  # Explorer thumbnails, pinned taskbar). The wrapped app variant's
  # white rim was visible as a hairline border at 16x16 titlebar size;
  # the bare glyph already has its own rounded-rect silhouette built
  # into the path, so it reads cleaner without the extra wrap.
  #
  # 20 and 24 are included so Windows titlebar on 125 % / 150 % DPI
  # monitors can pick an exact-match raster instead of up-scaling the
  # 16x16 slot (which came out very fuzzy on high-DPI screens).
  { path = "crates/gui/icons/icon.ico", sizes = [16, 20, 24, 32, 48, 64, 128, 256] },
]
