    renderBindHostSelects(settingsHost);
  }

  function applyI18n() {
    document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      const val = T(key);
      // Allow simple <br> in translations (e.g. about.desc)
      if (val.includes('<br>')) el.innerHTML = val;
      else el.textContent = val;
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      el.placeholder = T(el.getAttribute('data-i18n-placeholder'));
    });
    document.querySelectorAll('[data-i18n-title]').forEach(el => {
      const text = T(el.getAttribute('data-i18n-title'));
      if (el.classList.contains('pref-info')) {
        el.dataset.tooltip = text;
        el.setAttribute('aria-label', text);
        el.removeAttribute('title');
      } else {
        el.title = text;
      }
    });
    // Fill the FAB tooltip HERE, before the settings-only dynamic renders
    // below — those can throw on the workspaces tab and abort applyI18n,
    // which previously left this tip empty.
    renderWorkspaceAddTip();
    // Feedback buttons (dynamic)
    ['bug', 'idea', 'ask'].forEach(kind => {
      const btn = document.getElementById(`btn-${kind}`);
      if (btn) {
        btn.innerHTML = `${ICONS[kind]}${t[kind].label}`;
        btn.title = t[kind].tip;
      }
    });
    // Refresh language dropdown labels (the "auto" text changes with locale)
    populateLanguageSelects();
    renderBindHostSelects();
    // The global access-code widget is built dynamically (T()-labeled), so
    // rebuild it to relabel placeholder/tooltips/Apply on a language switch.
    renderGlobalAccessCode();
    // Re-render shortcuts and help tip with translated descriptions
    if (document.getElementById('shortcuts-list')?.children.length) {
      renderShortcuts();
      renderHelpTip();
    }
    // The workspace add FAB tooltip is always present — keep it labelled
    // on first load and on every language switch.
    renderWorkspaceAddTip();
    // Re-render web styles rows (labels/hints/tooltips are built dynamically)
    if (document.getElementById('webstyles-list')?.children.length) {
      renderWebStyles();
    }
  }

  // Populate language dropdowns from i18n meta.
  function populateLanguageSelects() {
    ['language', 'web_language'].forEach(id => {
      const sel = document.getElementById(id);
      const cur = sel.value || 'auto';
      sel.innerHTML = '';
      // "auto" option — label depends on which select
      const autoLabel = id === 'language' ? T('lang.auto') : T('web.auto');
      const autoOpt = document.createElement('option');
      autoOpt.value = 'auto';
      autoOpt.textContent = autoLabel;
      sel.appendChild(autoOpt);
      // Language options from i18n files
      availableLanguages.forEach(l => {
        const opt = document.createElement('option');
        opt.value = l.value;
        opt.textContent = l.label;
        sel.appendChild(opt);
      });
      sel.value = cur;
    });
  }

  function setLocale(localeStr) {
    const s = (localeStr || 'en').toLowerCase();
    // Match against available languages: exact value, exact key, or prefix match
    let newLang = 'en';
    for (const l of availableLanguages) {
      if (s === l.value.toLowerCase() || s === l.key) { newLang = l.key; break; }
      if (s.startsWith(l.key)) { newLang = l.key; }
    }
    if (newLang === lang && t === i18n[newLang]) return;
    lang = newLang;
    t = i18n[lang];
    applyI18n();
  }

  const ICONS = {
    // Bug — small bug outline
    bug: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="6" width="8" height="14" rx="4"/><path d="M12 6V4M8 6l-2-2M16 6l2-2M8 13H4M16 13h4M8 18l-3 3M16 18l3 3"/></svg>`,
    // Idea — lightbulb
    idea: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6M10 22h4M12 2a7 7 0 0 0-4 12.7c.8.7 1.3 1.5 1.5 2.3h5c.2-.8.7-1.6 1.5-2.3A7 7 0 0 0 12 2z"/></svg>`,
    // Ask — chat with question mark
    ask: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><path d="M9.5 9a2.5 2.5 0 0 1 5 0c0 1.5-2.5 2-2.5 3.5M12 16h.01"/></svg>`,
  };

  function buildUrl(kind, info) {
    const base = `https://github.com/${REPO}`;
    if (kind === 'bug') {
      // Bug → Issue (the only thing that becomes actionable work immediately)
      return base + '/issues/new'
        + '?labels=bug'
        + '&title=' + encodeURIComponent(t.titleBug)
        + '&body='  + encodeURIComponent(t.tplBug(info));
    }
    if (kind === 'idea') {
      // Idea → Discussions/Ideas (low-pressure proposal pool, upvotable)
      return base + '/discussions/new'
        + '?category=ideas'
        + '&title=' + encodeURIComponent(t.titleIdea)
        + '&body='  + encodeURIComponent(t.tplIdea(info));
    }
    // Ask → Discussions/Q&A
    return base + '/discussions/new'
      + '?category=q-a'
      + '&title=' + encodeURIComponent(t.titleAsk)
      + '&body='  + encodeURIComponent(t.tplAsk(info));
  }

  // Wire the three inline feedback buttons
  ['bug', 'idea', 'ask'].forEach(kind => {
    const btn = document.getElementById(`btn-${kind}`);
    btn.innerHTML = `${ICONS[kind]}${t[kind].label}`;
    btn.title = t[kind].tip;
    btn.addEventListener('click', async () => {
      let info = { app_version: '?', os: '?', os_version: '', arch: '' };
      try { info = await invoke('get_system_info'); } catch (_) {}
      invoke('open_url', { url: buildUrl(kind, info) });
    });
  });
  document.getElementById('link-github').addEventListener('click', e => {
    e.preventDefault();
    invoke('open_url', { url: 'https://github.com/kookyleo/markon' });
  });
  document.getElementById('link-license').addEventListener('click', e => {
    e.preventDefault();
    invoke('open_url', { url: 'https://github.com/kookyleo/markon/blob/main/LICENSE' });
  });
  document.getElementById('link-author').addEventListener('click', e => {
    e.preventDefault();
    invoke('open_url', { url: 'https://x.com/kookyle_' });
  });
  document.getElementById('link-icon-credit').addEventListener('click', e => {
    e.preventDefault();
    invoke('open_url', { url: 'https://www.flaticon.com/free-icons/markdown' });
  });

  // ── Init ────────────────────────────────────────────────────────────────
  // Initial render with default (en), then update once Rust reports system locale.
  applyI18n();
  (async () => {
    let s;
    try {
      const info = await invoke('get_system_info');
      document.getElementById('ver-label').textContent = `v${info.app_version}`;
      systemLocale = info.locale;
      // Respect saved language setting; fallback to system locale.
      s = await invoke('get_settings');
      const langPref = s.language ?? 'auto';
      if (langPref === 'auto') {
        setLocale(systemLocale);
      } else {
        setLocale(langPref);
      }
    } catch (_) {}
    // Render the visible tab (workspaces) FIRST and in isolation. The settings
    // tab isn't shown on load, so a failure hydrating it (loadSettings touches
    // many optional inputs unguarded) must NOT blank the workspace list — that
    // was the "empty until you switch tabs" bug.
    try { await refreshWorkspaces(); } catch (_) {}
    // Load settings AFTER locale is resolved so all UI renders in correct
    // language. Reuses the settings fetched above; re-fetches if that failed.
    try { s = await loadSettings(s); } catch (e) { console.error('loadSettings threw:', e); }
    // Belt-and-suspenders: the Page Styles + Keyboard Shortcuts lists render at
    // the tail of loadSettings, so any earlier throw would leave them empty.
    // Render them directly if still unpopulated.
    try { if (!document.getElementById('webstyles-list')?.children.length) renderWebStyles(); } catch (e) { console.error('renderWebStyles threw:', e); }
    try { if (!document.getElementById('shortcuts-list')?.children.length) renderShortcuts(); } catch (e) { console.error('renderShortcuts threw:', e); }
    try { refreshServerStatus(); } catch (_) {}
    try { setupBindHostListeners(); } catch (_) {}
    // Re-render the FAB tooltip now that DEFAULT_SHORTCUTS is initialized and
    // loadSettings has applied any user override. The FIRST applyI18n() runs
    // before `const DEFAULT_SHORTCUTS` is defined (it's declared lower in the
    // file), so getShortcut() hit its temporal-dead-zone and the shortcut pill
    // was silently dropped — the label showed but the "⌘N" chip never did.
    try { renderWorkspaceAddTip(); } catch (_) {}
    try { await runPendingNativeActions(); } catch (_) {}
    // Auto-check for updates on startup if enabled.
    if (s?.auto_update !== false) doUpdateCheck();
  })();
  window.addEventListener('focus', () => {
    // Don't rebuild the list while a code editor is actively being edited —
    // that would discard an in-progress code. Skip only while one is open;
    // it'll refresh on the next focus once editing ends.
    if (!acAnyEditing()) refreshWorkspaces();
    // Wi-Fi switch / VPN toggled while the settings window was idle — re-pull
    // the bind list and the server-status payload so warnings don't go stale.
    const currentHost = document.getElementById('host')?.value;
    loadBindHosts(currentHost);
    refreshServerStatus();
  });

  async function refreshServerStatus() {
    let status;
    try { status = await invoke('get_server_status'); } catch (_) { return; }
    if (status?.error) {
      toast(T('bind.bind_failed').replace('{error}', status.error), 'err');
    }
    if (typeof status?.host_available === 'boolean') {
      updateBindWarning(status.host, status.host_available);
    }
  }

  function setupBindHostListeners() {
    const ev = window.__TAURI__?.event;
    if (!ev?.listen) return;
    // Native File ▸ New Workspace (⌘N). The accelerator is registered on the
    // native menu (Rust side) because WKWebView won't deliver Cmd-letter combos
    // to JS; the menu handler emits this event and we run the normal add flow.
    ev.listen('menu:new-workspace', () => { addWorkspace(); });
    ev.listen('bind-hosts-changed', (evt) => {
      const payload = evt?.payload || {};
      if (Array.isArray(payload.hosts) && payload.hosts.length > 0) {
        bindHosts = payload.hosts;
      }
      const currentHost = document.getElementById('host')?.value;
      renderBindHostSelects(currentHost);
      if (typeof payload.host_available === 'boolean') {
        updateBindWarning(payload.current_host || currentHost, payload.host_available);
      }
    });
    ev.listen('server-status-changed', (evt) => {
      const payload = evt?.payload || {};
      if (payload.error) {
        toast(T('bind.bind_failed').replace('{error}', payload.error), 'err');
      }
      if (typeof payload.host_available === 'boolean') {
        updateBindWarning(payload.host, payload.host_available);
      }
    });
  }

  async function runPendingNativeActions() {
    if (await invoke('take_pending_new_workspace')) {
      addWorkspace();
    }
  }

  // ── Tips: Cmd+F search ───────────────────────────────────────────────

  const tipsInput = document.getElementById('tips-filter');

  function openTipsSearch() {

  function closeTipsSearch() {

    document.querySelectorAll('.tips-section').forEach(s => s.classList.remove('hidden'));
  }

  tipsInput.addEventListener('input', e => {
    const q = e.target.value.toLowerCase().trim();
    document.querySelectorAll('.tips-section').forEach(sec => {
      if (!q) { sec.classList.remove('hidden'); return; }

  document.getElementById('tips-search-close').addEventListener('click', closeTipsSearch);

  // Intercept Cmd+F / Ctrl+F when Tips tab is active
  document.addEventListener('keydown', e => {

  // ── CLI command builder ──────────────────────────────────────────────
  const cliIds = ['cli-path','cli-port','cli-host','cli-qr','cli-collab-access','cli-open'];
  const cliOutput = document.getElementById('cli-output');
  const cliAliasOutput = document.getElementById('cli-alias-output');

  function shellArg(value) {
    if (/^[A-Za-z0-9_./:@%+=,-]+$/.test(value)) return value;
    return `'${value.replace(/'/g, `'\\''`)}'`;
  }

  function buildCliCmd() {
    const path  = document.getElementById('cli-path').value.trim() || '.';
    const port  = document.getElementById('cli-port').value;
    const host  = document.getElementById('cli-host').value;
    const qr    = document.getElementById('cli-qr').value.trim();
    const collaboratorAccess = document.getElementById('cli-collab-access').value.trim();
    let parts = ['markon'];
    if (port && port !== '6419') parts.push(`-p ${port}`);
    if (host) parts.push(`--host ${host}`);
    if (qr) parts.push(`--entry ${shellArg(qr)}`);
    if (collaboratorAccess) parts.push(`--collaborator-access-code ${shellArg(collaboratorAccess)}`);
    if (document.getElementById('cli-open').checked)   parts.push('-b');
    parts.push(shellArg(path));
    const cmd = parts.join(' ');
    cliOutput.textContent = cmd;
    // Shell alias: detect rc file at runtime from $SHELL (works for bash/zsh)
    const alias = `echo "alias mkon='${cmd}'" >> ~/."$(basename "$SHELL")rc"`;
    cliAliasOutput.textContent = alias;
    return cmd;
  }

  cliIds.forEach(id => {
    const el = document.getElementById(id);
    // Guard against a stale id (an element removed from the HTML but left in
    // this list): a null deref here throws at top level and aborts the rest of
    // the script — which silently kills every const/handler defined below it.
    if (!el) return;
    el.addEventListener(el.type === 'checkbox' ? 'change' : 'input', () => {
      // Toggle pill style
      if (el.type === 'checkbox') {
        el.closest('.cli-pill')?.classList.toggle('on', el.checked);
      }
      buildCliCmd();
    });
  });
  buildCliCmd();

  // Copy button (CLI + any static tips-copy buttons)
  function attachCopyHandler(btn) {
    btn.addEventListener('click', () => {
      const cmd = cliOutput.textContent;
      const origHtml = btn.innerHTML;
      navigator.clipboard.writeText(cmd).then(() => {
        btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
        btn.classList.add('copied');
        setTimeout(() => { btn.innerHTML = origHtml; btn.classList.remove('copied'); }, 1500);
      });
    });
  }
  document.querySelectorAll('.tips-copy').forEach(attachCopyHandler);

  // ── Auto-update check ───────────────────────────────────────────────────
  // ── Web styles editor ────────────────────────────────────────────────
  // Semantic design tokens: 6 colors (light + dark) + typography + opacity.
  // Other tokens (text-muted, elevated, elevated-2, overlay, border-strong)
  // are derived in editor.css from these and not user-configurable.
  const STYLE_DEFS = [
    { key: 'primary',  type: 'duocolor', defLight: '#0969da', defDark: '#58a6ff',
      hint: 'webstyles.primary.hint' },
    { key: 'muted',    type: 'duocolor', defLight: '#656d76', defDark: '#8b949e',
      hint: 'webstyles.muted.hint' },
    { key: 'border',   type: 'duocolor', defLight: '#d1d9e0', defDark: '#30363d',
      hint: 'webstyles.border.hint' },
    { key: 'subtle',   type: 'duocolor', defLight: '#f6f8fa', defDark: '#161b22',
      hint: 'webstyles.subtle.hint' },
    { key: 'canvas',   type: 'duocolor', defLight: '#ffffff', defDark: '#0d1117',
      hint: 'webstyles.canvas.hint' },
    { key: 'text',     type: 'duocolor', defLight: '#1f2328', defDark: '#f0f6fc',
      hint: 'webstyles.text.hint' },
    { key: 'ui-font',          type: 'font',  def: 'system-ui, sans-serif' },
    { key: 'ui-font-size',     type: 'range', def: '0.80', min: 0.60, max: 1.20, step: 0.05, unit: 'rem' },
    { key: 'panel-opacity',    type: 'range', def: '0.90', min: 0.30, max: 1.00, step: 0.05, unit: '' },
  ];

  let currentWebStyles = {};

  // Undo-arrow icon shared by the web-styles and shortcuts row-reset buttons.
  const UNDO_SVG = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 0 11H11"/></svg>';

  function isStyleAtDefault(d) {
    if (d.type === 'duocolor') {
      return !(`${d.key}.light` in currentWebStyles) && !(`${d.key}.dark` in currentWebStyles);
    }
    return !(d.key in currentWebStyles);
  }

  function resetStyleRow(d) {
    if (d.type === 'duocolor') {
      delete currentWebStyles[`${d.key}.light`];
      delete currentWebStyles[`${d.key}.dark`];
    } else {
      delete currentWebStyles[d.key];
    }
    saveSettings();
    renderWebStyles();
  }

  function renderWebStyles() {
    const list = document.getElementById('webstyles-list');
    list.innerHTML = '';
    function appendResetBtn(row, d) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'btn-tiny row-reset ' + (isStyleAtDefault(d) ? 'is-default' : '');
      btn.title = T('webstyles.reset.row');
      btn.innerHTML = UNDO_SVG;
      btn.addEventListener('click', () => {
        if (isStyleAtDefault(d)) return;
        resetStyleRow(d);
      });
      row.appendChild(btn);
    }
    for (const d of STYLE_DEFS) {
      const row = document.createElement('div');
      row.className = 'style-row';
      const label = T('webstyles.' + d.key) || d.key;
      const hint = d.hint ? T(d.hint) : '';

      if (d.type === 'duocolor') {
        // Two color pickers: light (☀) + dark (🌙)
        const valL = currentWebStyles[d.key + '.light'] || d.defLight;
        const valD = currentWebStyles[d.key + '.dark'] || d.defDark;
        row.innerHTML = `<span class="st-name">${label}${hint ? '<br><small style="color:var(--text-2);font-size:10px;font-weight:400">' + hint + '</small>' : ''}</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="opacity:.4;flex-shrink:0"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <input type="color" value="${valL}" data-key="${d.key}.light">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="opacity:.4;flex-shrink:0"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <input type="color" value="${valD}" data-key="${d.key}.dark">`;
        row.querySelectorAll('input[type="color"]').forEach(inp => {
          inp.addEventListener('input', () => {
            const k = inp.dataset.key;
            const base = k.replace(/\.(light|dark)$/, '');
            const mode = k.endsWith('.light') ? 'light' : 'dark';
            const def = mode === 'light' ? d.defLight : d.defDark;
            if (inp.value === def) { delete currentWebStyles[k]; } else { currentWebStyles[k] = inp.value; }
            saveSettings();
            row.querySelector('.row-reset')?.classList.toggle('is-default', isStyleAtDefault(d));
          });
        });
        appendResetBtn(row, d);
        list.appendChild(row);
        continue;
      }

      const val = currentWebStyles[d.key] || d.def;
      if (d.type === 'font') {
        row.innerHTML = `<span class="st-name">${label}</span>
          <select data-key="${d.key}" style="flex:1;max-width:180px;font-size:11px"></select>`;
        const sel = row.querySelector('select');
        function populateFontSelect(fonts) {
          sel.innerHTML = '';
          for (const f of fonts) {
            const opt = document.createElement('option');
            opt.value = f; opt.textContent = f;
            opt.style.fontFamily = f;
            sel.appendChild(opt);
          }
          sel.value = val;
          if (sel.value !== val) {
            const opt = document.createElement('option');
            opt.value = val; opt.textContent = val;
            sel.insertBefore(opt, sel.firstChild);
            sel.value = val;
          }
        }
        invoke('list_fonts').then(fonts => {
          populateFontSelect(['system-ui, sans-serif', ...fonts]);
        }).catch(() => {
          populateFontSelect(['system-ui, sans-serif', 'Arial', 'Helvetica Neue', 'Georgia', 'Menlo', 'Monaco', 'Inter']);
        });
      } else if (d.type === 'range') {
        const num = parseFloat(val) || parseFloat(d.def);
        row.innerHTML = `<span class="st-name">${label}</span>
          <input type="range" min="${d.min}" max="${d.max}" step="${d.step}" value="${num}" data-key="${d.key}" data-unit="${d.unit}" style="width:100px;accent-color:var(--accent)">
          <span class="st-val" style="font-size:11px;color:var(--text-2);width:56px;text-align:right;font-family:monospace;flex-shrink:0">${num.toFixed(2)}${d.unit}</span>`;
      }
      row.querySelectorAll('input, select[data-key]').forEach(inp => {
        inp.addEventListener(inp.tagName === 'SELECT' ? 'change' : 'input', () => {
          const k = inp.dataset.key;
          let v = inp.value;
          const def = STYLE_DEFS.find(s => s.key === k);
          if (inp.type === 'range') {
            const unit = inp.dataset.unit || '';
            const valSpan = row.querySelector('.st-val');
            if (valSpan) valSpan.textContent = parseFloat(v).toFixed(2) + unit;
            v = v + unit;
          }
          if (v === def?.def || v === def?.def + (def?.unit || '')) {
            delete currentWebStyles[k];
          } else {
            currentWebStyles[k] = v;
          }
          saveSettings();
          row.querySelector('.row-reset')?.classList.toggle('is-default', isStyleAtDefault(d));
        });
      });
      appendResetBtn(row, d);
      list.appendChild(row);
    }
  }

  document.getElementById('webstyles-reset').addEventListener('click', () => {
    currentWebStyles = {};
    saveSettings();
    renderWebStyles();
  });

  // ── Shortcuts editor ─────────────────────────────────────────────────

  // i18n keys for shortcut descriptions (reuse web.kbd.* keys)
  const SHORTCUT_DESC_KEYS = {
    UNDO: 'web.kbd.undo', REDO: 'web.kbd.redo', REDO_ALT: 'web.kbd.redo.alt',
    ESCAPE: 'web.kbd.escape', TOGGLE_TOC: 'web.kbd.toc', HELP: 'web.kbd.help',
    THEME_PANEL: 'web.kbd.theme',
    NEW_WORKSPACE: 'ws.add.hint',
    SEARCH: 'web.kbd.search', WORKSPACE_NAVIGATOR: 'web.kbd.workspace_nav',
    PREV_HEADING: 'web.kbd.prevheading',
    NEXT_HEADING: 'web.kbd.nextheading', PREV_ANNOTATION: 'web.kbd.prevanno',
    NEXT_ANNOTATION: 'web.kbd.nextanno', SCROLL_HALF_PAGE_DOWN: 'web.kbd.scroll',
    TOGGLE_SECTION_COLLAPSE: 'web.kbd.collapse', TOGGLE_VIEWED: 'web.kbd.viewed',
    EDIT: 'web.kbd.edit',
    TOGGLE_LIVE_ACTIVE: 'web.kbd.live.active', TOGGLE_LIVE_OFF: 'web.kbd.live.off',
    TOGGLE_CHAT: 'web.kbd.chat', TOGGLE_CHAT_ALT: 'web.kbd.chat.alt',
    DIFF_TOGGLE_VIEW: 'web.kbd.diff.view',
    DIFF_NEXT_FILE: 'web.kbd.diff.nextfile',
    DIFF_PREV_FILE: 'web.kbd.diff.prevfile',
  };

  // Render layout: each row holds one or more shortcut names. Multi-name rows
  // collapse synonymous bindings (e.g. UNDO/REDO has a primary and an alt
  // chord) into a single row whose label uses the primary's description and
  // whose reset button clears all names in the row at once.
  const SHORTCUT_ROWS = [
    ['UNDO'],
    ['REDO', 'REDO_ALT'],
    ['ESCAPE'],
    ['TOGGLE_TOC'],
    ['HELP'],
    ['THEME_PANEL'],
    ['NEW_WORKSPACE'],
    ['SEARCH', 'WORKSPACE_NAVIGATOR'],
    ['PREV_HEADING'],
    ['NEXT_HEADING'],
    ['PREV_ANNOTATION'],
    ['NEXT_ANNOTATION'],
    ['SCROLL_HALF_PAGE_DOWN'],
    ['TOGGLE_SECTION_COLLAPSE'],
    ['TOGGLE_VIEWED'],
    ['EDIT'],
    ['TOGGLE_LIVE_ACTIVE'],
    ['TOGGLE_LIVE_OFF'],
    ['TOGGLE_CHAT'],
    ['TOGGLE_CHAT_ALT'],
    ['DIFF_TOGGLE_VIEW'],
    ['DIFF_NEXT_FILE'],
    ['DIFF_PREV_FILE'],
  ];

  let currentShortcuts = {}; // user overrides only

  function formatKey(sc) {
    const parts = [];
    if (sc.ctrl) parts.push(navigator.platform.includes('Mac') ? '⌘' : 'Ctrl');
    if (sc.shift) parts.push('Shift');
    let k = sc.key;
    if (k === ' ') k = 'Space';
    else if (k === 'Escape') k = 'Esc';
    else if (k.length === 1) k = k.toUpperCase();
    parts.push(k);
    return parts.join(' + ');
  }

  function getShortcut(name) {
    return { ...DEFAULT_SHORTCUTS[name], ...(currentShortcuts[name] || {}) };
  }

  function isShortcutPressed(e, sc) {
    if (e.altKey) return false;
    if (!!(e.metaKey || e.ctrlKey) !== !!sc.ctrl) return false;
    if (!!e.shiftKey !== !!sc.shift) return false;
    const pressed = e.key.length === 1 ? e.key.toLowerCase() : e.key;
    const expected = sc.key.length === 1 ? sc.key.toLowerCase() : sc.key;
    return pressed === expected;
  }

  function renderHelpTip() {
    const helpSc = getShortcut('HELP');
    const el = document.getElementById('tips-quickstart-3');
    if (el) el.innerHTML = T('tips.quickstart.3').replace('{key}', `<kbd>${formatKey(helpSc)}</kbd>`);
  }

  function isShortcutAtDefault(name) {
    const cur = currentShortcuts[name];
    if (!cur) return true;
    const def = DEFAULT_SHORTCUTS[name];
    return cur.key === def.key && !!cur.ctrl === !!def.ctrl && !!cur.shift === !!def.shift;
  }

  function isRowAtDefault(names) {
    return names.every(isShortcutAtDefault);
  }

  function renderShortcuts() {
    const list = document.getElementById('shortcuts-list');
    list.innerHTML = '';
    for (const names of SHORTCUT_ROWS) {
      const primary = names[0];
      const row = document.createElement('div');
      row.className = 'shortcut-row';
      const atDefault = isRowAtDefault(names);
      const keysHtml = names.map(n =>
        `<div class="sc-key" tabindex="0" data-name="${n}">${formatKey(getShortcut(n))}</div>`
      ).join('');
      row.innerHTML = `
        <span class="sc-name">${T(SHORTCUT_DESC_KEYS[primary] || primary)}</span>
        <div class="sc-actions">
          ${keysHtml}
          <button type="button" class="btn-tiny row-reset ${atDefault ? 'is-default' : ''}" title="${T('shortcuts.reset.row')}">${UNDO_SVG}</button>
        </div>
      `;
      row.querySelectorAll('.sc-key').forEach(keyEl => {
        const name = keyEl.dataset.name;
        keyEl.addEventListener('click', () => startRecording(keyEl, name));
        keyEl.addEventListener('keydown', (e) => {
          if (!keyEl.classList.contains('recording')) return;
          e.preventDefault();
          e.stopPropagation();
          // Ignore modifier-only presses — wait for an actual key
          if (['Meta', 'Control', 'Shift', 'Alt', 'CapsLock'].includes(e.key)) return;
          if (e.key === 'Escape' && !e.metaKey && !e.ctrlKey && !e.shiftKey) {
            stopRecording(keyEl, name, null); return;
          }
          const sc = { key: e.key, ctrl: e.metaKey || e.ctrlKey, shift: e.shiftKey };
          stopRecording(keyEl, name, sc);
        });
      });
      const resetBtn = row.querySelector('.row-reset');
      resetBtn.addEventListener('click', () => {
        // While any chip in this row is mid-recording, the button acts as
        // a cancel — stopRecording(null) restores the prior binding without
        // touching saved settings. Only when nothing is being recorded does
        // it fall through to the actual reset-to-default behavior.
        const recordingKeys = row.querySelectorAll('.sc-key.recording');
        if (recordingKeys.length > 0) {
          recordingKeys.forEach(keyEl => {
            stopRecording(keyEl, keyEl.dataset.name, null);
          });
          return;
        }
        if (isRowAtDefault(names)) return;
        for (const n of names) delete currentShortcuts[n];
        saveSettings();
        row.querySelectorAll('.sc-key').forEach(keyEl => {
          keyEl.textContent = formatKey(getShortcut(keyEl.dataset.name));
        });
        resetBtn.classList.add('is-default');
        renderHelpTip();
        renderWorkspaceAddTip();
      });
      list.appendChild(row);
    }
    renderWorkspaceAddTip();
  }

  function startRecording(el, name) {
    document.querySelectorAll('.sc-key.recording').forEach(k => {
      k.classList.remove('recording');
      const n = k.dataset.name;
      const cur = getShortcut(n);
      k.textContent = formatKey(cur);
    });
    el.classList.add('recording');
    el.textContent = T('shortcuts.record');
    el.focus();
  }

  function stopRecording(el, name, sc) {
    el.classList.remove('recording');
    if (sc) {
      const def = DEFAULT_SHORTCUTS[name];
      if (sc.key === def.key && sc.ctrl === def.ctrl && sc.shift === def.shift) {
        delete currentShortcuts[name];
      } else {
        currentShortcuts[name] = sc;
      }
      saveSettings();
    }
    const cur = getShortcut(name);
    el.textContent = formatKey(cur);
    // Sync the per-row reset-button dim state. Reset is shared across all
    // sc-keys in the row, so dim state depends on every name in the row.
    const row = el.closest('.shortcut-row');
    const resetBtn = row?.querySelector('.row-reset');
    if (resetBtn) {
      const names = Array.from(row.querySelectorAll('.sc-key')).map(k => k.dataset.name);
      resetBtn.classList.toggle('is-default', isRowAtDefault(names));
    }
    renderWorkspaceAddTip();
  }

  document.getElementById('shortcuts-reset').addEventListener('click', () => {
    currentShortcuts = {};
    saveSettings();
    renderShortcuts();
    renderHelpTip();
  });

  const statusEl = document.getElementById('update-status');
  const retryBtn = document.getElementById('update-retry');
  const restartLink = document.getElementById('update-restart');

  async function doUpdateCheck() {
    statusEl.textContent = T('update.checking');
    statusEl.style.color = 'var(--text-2)';
    retryBtn.style.display = 'none';
    restartLink.style.display = 'none';
    try {
      const r = await invoke('check_for_update');
      if (r.error) {
        const is404 = /404|not found/i.test(r.error);
        statusEl.textContent = is404 ? T('update.unavailable') : T('update.error');
        statusEl.title = r.error;
        statusEl.style.color = is404 ? 'var(--text-3)' : 'var(--danger)';
        retryBtn.style.display = is404 ? 'none' : 'inline';
      } else if (r.available && r.installed) {
        statusEl.textContent = T('update.done');
        statusEl.style.color = 'var(--accent)';
        restartLink.style.display = 'inline';
      } else if (r.available) {
        statusEl.textContent = T('update.found').replace('{v}', r.latest);
        statusEl.style.color = 'var(--accent)';
      } else {
        statusEl.textContent = T('update.latest');
        statusEl.style.color = 'var(--text-2)';
        retryBtn.style.display = 'inline';
      }
    } catch (e) {
      statusEl.textContent = T('update.error');
      statusEl.style.color = 'var(--danger)';
      retryBtn.style.display = 'inline';
    }
  }

  retryBtn.addEventListener('click', doUpdateCheck);
  restartLink.addEventListener('click', (e) => {
    e.preventDefault();
    window.__TAURI__.process.relaunch();
  });

  })().catch(err => console.error('[markon] init failed:', err));
</script>
</body>
</html>
