<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#FAFAF7"/>

  <!-- Page card (the web window) -->
  <rect x="40" y="40" width="720" height="520" rx="12" fill="#FFFFFF" stroke="#EEEEEA"/>

  <!-- macOS-style traffic lights -->
  <circle cx="64" cy="74" r="6" fill="#FF5F57"/>
  <circle cx="84" cy="74" r="6" fill="#FEBC2E"/>
  <circle cx="104" cy="74" r="6" fill="#28C840"/>

  <!-- Address bar -->
  <rect x="240" y="62" width="280" height="24" rx="12" fill="#F5F5F0"/>

  <!-- Three-dot menu -->
  <circle cx="704" cy="74" r="2.5" fill="#D7D7D2"/>
  <circle cx="716" cy="74" r="2.5" fill="#D7D7D2"/>
  <circle cx="728" cy="74" r="2.5" fill="#D7D7D2"/>

  <!-- Header divider -->
  <line x1="40" y1="106" x2="760" y2="106" stroke="#F0F0EB"/>

  <!-- ============= Document content (faded background) ============= -->
  <rect x="64" y="138" rx="3" width="220" height="18" fill="#D6D8DA"/>
  <rect x="64" y="172" rx="2" width="540" height="8" fill="#EAEBEC"/>
  <rect x="64" y="190" rx="2" width="480" height="8" fill="#EAEBEC"/>

  <!-- Below this y, paragraphs stop short of the chatbox -->
  <rect x="64" y="218" rx="2" width="296" height="8" fill="#EAEBEC"/>

  <rect x="64" y="252" rx="3" width="150" height="13" fill="#D6D8DA"/>

  <rect x="64" y="282" rx="2" width="296" height="8" fill="#EAEBEC"/>
  <rect x="64" y="300" rx="2" width="260" height="8" fill="#EAEBEC"/>
  <rect x="64" y="318" rx="2" width="296" height="8" fill="#EAEBEC"/>
  <rect x="64" y="336" rx="2" width="240" height="8" fill="#EAEBEC"/>

  <!-- Code block -->
  <rect x="64" y="368" rx="4" width="280" height="64" fill="#F7F7F2"/>
  <rect x="80" y="382" rx="2" width="160" height="6" fill="#DEE0DD"/>
  <rect x="80" y="396" rx="2" width="200" height="6" fill="#DEE0DD"/>
  <rect x="80" y="410" rx="2" width="120" height="6" fill="#DEE0DD"/>

  <rect x="64" y="448" rx="2" width="280" height="8" fill="#EAEBEC"/>
  <rect x="64" y="466" rx="2" width="240" height="8" fill="#EAEBEC"/>
  <rect x="64" y="484" rx="2" width="200" height="8" fill="#EAEBEC"/>
  <rect x="64" y="502" rx="2" width="180" height="8" fill="#EAEBEC"/>
  <rect x="64" y="520" rx="2" width="140" height="8" fill="#EAEBEC"/>

  <!-- ============= Chatbox (simplified) ============= -->
  <rect x="380" y="220" width="360" height="320" rx="14" fill="#FFFFFF" stroke="#A78BFA" stroke-width="2"/>

  <!-- Purple header: avatar + title only -->
  <path d="M380 234 a14 14 0 0 1 14 -14 h332 a14 14 0 0 1 14 14 v40 h-360 z" fill="#8B5CF6"/>
  <circle cx="408" cy="252" r="11" fill="#FFFFFF"/>
  <rect x="430" y="247" rx="2" width="130" height="10" fill="#FFFFFF" opacity="0.95"/>

  <!-- AI bubble 1 (2 lines) -->
  <rect x="396" y="300" width="240" height="50" rx="14" fill="#F3F4F6"/>
  <rect x="412" y="314" rx="2" width="200" height="7" fill="#4B5563"/>
  <rect x="412" y="328" rx="2" width="160" height="7" fill="#4B5563"/>

  <!-- User bubble (1 line, right-aligned) -->
  <rect x="476" y="368" width="240" height="40" rx="14" fill="#8B5CF6"/>
  <rect x="492" y="382" rx="2" width="180" height="7" fill="#FFFFFF" opacity="0.95"/>

  <!-- AI bubble 2 (2 lines + simple citation pill) -->
  <rect x="396" y="424" width="260" height="74" rx="14" fill="#F3F4F6"/>
  <rect x="412" y="438" rx="2" width="220" height="7" fill="#4B5563"/>
  <rect x="412" y="452" rx="2" width="180" height="7" fill="#4B5563"/>
  <rect x="412" y="476" rx="6" width="56" height="14" fill="#EDE9FE" stroke="#C4B5FD"/>
  <circle cx="423" cy="483" r="3" fill="#7C3AED"/>

  <!-- Input bar + send -->
  <rect x="396" y="514" width="280" height="20" rx="10" fill="#F3F4F6"/>
  <circle cx="708" cy="524" r="12" fill="#8B5CF6"/>
  <polygon points="700,518 714,524 700,530" fill="#FFFFFF"/>
</svg>
