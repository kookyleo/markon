<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.10"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="menuSh" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dy="10"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="800" fill="#FAFAF7"/>

  <!-- Markdown file on desktop (abstract, no filename label) -->
  <g transform="translate(120 150)" filter="url(#sh)">
    <rect x="0" y="0" width="64" height="84" rx="6" fill="#FFFFFF" stroke="#E5E7EB"/>
    <path d="M 50 0 L 64 14 L 50 14 Z" fill="#F3F4F6"/>
    <!-- title bar in brand green -->
    <rect x="10" y="22" width="36" height="6" rx="2" fill="#27ae60"/>
    <!-- paragraph lines -->
    <rect x="10" y="36" width="44" height="3" rx="1" fill="#9CA3AF"/>
    <rect x="10" y="42" width="36" height="3" rx="1" fill="#9CA3AF"/>
    <rect x="10" y="48" width="44" height="3" rx="1" fill="#9CA3AF"/>
    <rect x="10" y="54" width="32" height="3" rx="1" fill="#9CA3AF"/>
    <rect x="10" y="60" width="44" height="3" rx="1" fill="#9CA3AF"/>
    <rect x="10" y="66" width="40" height="3" rx="1" fill="#9CA3AF"/>
    <rect x="10" y="72" width="44" height="3" rx="1" fill="#9CA3AF"/>
  </g>

  <!-- Main context menu (light) -->
  <g filter="url(#menuSh)">
    <rect x="130" y="220" width="270" height="290" rx="12" fill="#FFFFFF" stroke="#E5E7EB"/>

    <!-- Open -->
    <g transform="translate(146 232)">
      <g transform="translate(0 6)" stroke="#6B7280" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 12.5 8 L 12.5 13 L 2.5 13 L 2.5 3 L 7.5 3"/>
        <path d="M 8 8 L 14 2"/>
        <path d="M 14 6 L 14 2 L 10 2"/>
      </g>
      <rect x="28" y="11" width="80" height="6" rx="2" fill="#6B7280"/>
    </g>

    <!-- Open With (selected, brand green) -->
    <g transform="translate(138 260)">
      <rect x="0" y="0" width="254" height="32" rx="6" fill="#27ae60"/>
      <g transform="translate(8 8)" stroke="#FFFFFF" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="12" height="10" rx="1.5"/>
        <line x1="2" y1="6" x2="14" y2="6"/>
        <circle cx="4" cy="4.5" r="0.5" fill="#FFFFFF" stroke="none"/>
      </g>
      <rect x="36" y="13" width="120" height="6" rx="2" fill="#FFFFFF"/>
      <polyline points="232,12 238,16 232,20" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Move to Trash -->
    <g transform="translate(146 292)">
      <g transform="translate(0 6)" stroke="#6B7280" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 2.5 5 L 13.5 5"/>
        <path d="M 6 5 L 6 3.5 L 10 3.5 L 10 5"/>
        <path d="M 4 5 L 5 13.5 L 11 13.5 L 12 5"/>
      </g>
      <rect x="28" y="11" width="100" height="6" rx="2" fill="#6B7280"/>
    </g>

    <line x1="146" y1="324" x2="384" y2="324" stroke="#F3F4F6"/>

    <!-- Get Info -->
    <g transform="translate(146 328)">
      <g transform="translate(0 6)" stroke="#6B7280" stroke-width="1.4" fill="none" stroke-linecap="round">
        <circle cx="8" cy="8" r="6"/>
        <line x1="8" y1="7.5" x2="8" y2="11.5"/>
        <circle cx="8" cy="5" r="0.6" fill="#6B7280" stroke="none"/>
      </g>
      <rect x="28" y="11" width="64" height="6" rx="2" fill="#6B7280"/>
    </g>

    <!-- Rename -->
    <g transform="translate(146 356)">
      <g transform="translate(0 6)" stroke="#6B7280" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 11 2 L 14 5 L 5 14 L 2 14 L 2 11 Z"/>
        <line x1="9" y1="4" x2="12" y2="7"/>
      </g>
      <rect x="28" y="11" width="72" height="6" rx="2" fill="#6B7280"/>
    </g>

    <!-- Quick Look -->
    <g transform="translate(146 384)">
      <g transform="translate(0 6)" stroke="#6B7280" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 1 8 C 3.5 4 12.5 4 15 8 C 12.5 12 3.5 12 1 8 Z"/>
        <circle cx="8" cy="8" r="2.2"/>
      </g>
      <rect x="28" y="11" width="84" height="6" rx="2" fill="#6B7280"/>
    </g>

    <line x1="146" y1="416" x2="384" y2="416" stroke="#F3F4F6"/>

    <!-- Copy -->
    <g transform="translate(146 420)">
      <g transform="translate(0 6)" stroke="#6B7280" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="5" width="9" height="9" rx="1.5"/>
        <path d="M 5 5 L 5 2 L 14 2 L 14 11 L 11 11"/>
      </g>
      <rect x="28" y="11" width="48" height="6" rx="2" fill="#6B7280"/>
    </g>

    <!-- Share -->
    <g transform="translate(146 448)">
      <g transform="translate(0 6)" stroke="#6B7280" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 8 10 L 8 2"/>
        <path d="M 5 5 L 8 2 L 11 5"/>
        <path d="M 3 9 L 3 14 L 13 14 L 13 9"/>
      </g>
      <rect x="28" y="11" width="60" height="6" rx="2" fill="#6B7280"/>
    </g>

    <line x1="146" y1="480" x2="384" y2="480" stroke="#F3F4F6"/>

    <!-- Tags -->
    <g transform="translate(146 484)">
      <g transform="translate(0 6)" stroke="#6B7280" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 8 1.5 L 14 1.5 L 14 7.5 L 7.5 14 L 1.5 8 Z"/>
        <circle cx="11" cy="4.5" r="0.8" fill="#6B7280" stroke="none"/>
      </g>
      <rect x="28" y="11" width="56" height="6" rx="2" fill="#6B7280"/>
    </g>
  </g>

  <!-- Open With submenu (light) -->
  <g filter="url(#menuSh)">
    <rect x="400" y="260" width="320" height="124" rx="12" fill="#FFFFFF" stroke="#E5E7EB"/>

    <!-- Browser app row -->
    <g transform="translate(418 272)">
      <g transform="translate(0 6)">
        <circle cx="8" cy="8" r="7" fill="#FBBF24"/>
        <circle cx="8" cy="8" r="3" fill="#FFFFFF"/>
      </g>
      <rect x="28" y="11" width="120" height="6" rx="2" fill="#6B7280"/>
    </g>

    <line x1="418" y1="304" x2="702" y2="304" stroke="#F3F4F6"/>

    <!-- Markon (selected, brand green) -->
    <g transform="translate(410 308)">
      <rect x="0" y="0" width="300" height="32" rx="6" fill="#27ae60"/>
      <g transform="translate(8 8)">
        <rect x="0" y="0" width="16" height="16" rx="3" fill="#FFFFFF"/>
        <text x="8" y="11.5" font-family="ui-sans-serif, system-ui" font-size="9" font-weight="800" fill="#27ae60" text-anchor="middle">M↓</text>
      </g>
      <rect x="36" y="13" width="78" height="6" rx="2" fill="#FFFFFF"/>
      <rect x="124" y="14" width="40" height="4" rx="1" fill="#FFFFFF" opacity="0.65"/>
    </g>

    <!-- TextEdit row -->
    <g transform="translate(418 340)">
      <g transform="translate(0 6)">
        <rect x="0.5" y="0.5" width="15" height="15" rx="2.5" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
        <line x1="3" y1="4" x2="13" y2="4" stroke="#9CA3AF" stroke-width="1"/>
        <line x1="3" y1="8" x2="13" y2="8" stroke="#9CA3AF" stroke-width="1"/>
        <line x1="3" y1="12" x2="9" y2="12" stroke="#9CA3AF" stroke-width="1"/>
      </g>
      <rect x="28" y="11" width="80" height="6" rx="2" fill="#6B7280"/>
    </g>
  </g>
</svg>
