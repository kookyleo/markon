<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.10"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="noteSh" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dy="5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="800" fill="#FAFAF7"/>

  <!-- Avatars -->
  <g transform="translate(110 200)" filter="url(#sh)">
    <circle r="32" fill="#FFFFFF" stroke="#EAB308" stroke-width="3"/>
    <circle r="22" fill="#FFE066"/>
  </g>
  <g transform="translate(690 540)" filter="url(#sh)">
    <circle r="32" fill="#FFFFFF" stroke="#16A34A" stroke-width="3"/>
    <circle r="22" fill="#86E5A4"/>
  </g>

  <g filter="url(#sh)">
    <rect x="170" y="170" width="460" height="440" rx="16" fill="#FFFFFF" stroke="#E5E7EB"/>
    <rect x="200" y="200" rx="3" width="220" height="14" fill="#111827"/>
    <rect x="200" y="226" rx="2" width="160" height="8" fill="#9CA3AF"/>

    <!-- line 1 yellow highlight -->
    <rect x="196" y="262" rx="2" width="380" height="20" fill="#FFE066" opacity="0.85"/>
    <rect x="200" y="270" rx="2" width="370" height="8" fill="#374151"/>

    <!-- line 2 green highlight -->
    <rect x="196" y="304" rx="2" width="320" height="20" fill="#86E5A4" opacity="0.75"/>
    <rect x="200" y="312" rx="2" width="310" height="8" fill="#374151"/>
    <rect x="200" y="332" rx="2" width="240" height="8" fill="#9CA3AF"/>

    <!-- line 3 strikethrough -->
    <rect x="200" y="376" rx="2" width="380" height="8" fill="#9CA3AF"/>
    <line x1="196" y1="380" x2="586" y2="380" stroke="#DC2626" stroke-width="2"/>
    <rect x="200" y="396" rx="2" width="280" height="8" fill="#9CA3AF"/>

    <!-- line 4 sticky note attached -->
    <rect x="200" y="440" rx="2" width="380" height="8" fill="#9CA3AF"/>
    <rect x="200" y="458" rx="2" width="200" height="8" fill="#9CA3AF"/>
    <rect x="380" y="436" rx="2" width="80" height="16" fill="#FFE066" opacity="0.85"/>
  </g>

  <!-- sticky note popup attached to line 4 -->
  <g transform="translate(440 488)" filter="url(#noteSh)">
    <rect x="0" y="0" width="240" height="130" fill="#FFFBEB" stroke="#EAB308" stroke-width="1"/>
    <rect x="22" y="20" rx="3" width="60" height="9" fill="#16A34A"/>
    <rect x="92" y="20" rx="3" width="40" height="9" fill="#9CA3AF"/>
    <rect x="22" y="44" rx="2" width="200" height="7" fill="#4B5563"/>
    <rect x="22" y="58" rx="2" width="180" height="7" fill="#4B5563"/>
    <rect x="22" y="72" rx="2" width="210" height="7" fill="#4B5563"/>
    <rect x="22" y="86" rx="2" width="120" height="7" fill="#4B5563"/>
    <!-- reply line -->
    <line x1="22" y1="106" x2="218" y2="106" stroke="#FDE68A"/>
    <rect x="22" y="114" rx="2" width="50" height="7" fill="#9CA3AF"/>
  </g>
</svg>
