<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.10"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="800" fill="#FAFAF7"/>

  <!-- Follower (back layer, left) — smaller, secondary, sparser content -->
  <g filter="url(#sh)">
    <rect x="60" y="220" width="290" height="420" rx="14" fill="#FFFFFF" stroke="#E5E7EB"/>
    <path d="M 60 234 a14 14 0 0 1 14 -14 h262 a14 14 0 0 1 14 14 v18 h-290 z" fill="#F8F9FA"/>
    <line x1="60" y1="252" x2="350" y2="252" stroke="#E5E7EB"/>
    <circle cx="82" cy="239" r="5" fill="#FF5F57"/>
    <circle cx="98" cy="239" r="5" fill="#FEBC2E"/>
    <circle cx="114" cy="239" r="5" fill="#28C840"/>

    <!-- title -->
    <rect x="82" y="288" rx="3" width="150" height="13" fill="#4B5563"/>

    <!-- single paragraph above focus -->
    <rect x="82" y="334" rx="2" width="230" height="6" fill="#D1D5DB"/>

    <!-- focused paragraph — the broadcaster's focus mirrored onto the follower (orange, same as the pulse) -->
    <rect x="70" y="376" width="270" height="52" rx="10" fill="none" stroke="#FF8A3D" stroke-width="1.5"/>
    <rect x="86" y="392" rx="2" width="226" height="6" fill="#9CA3AF"/>
    <rect x="86" y="406" rx="2" width="190" height="6" fill="#9CA3AF"/>

    <!-- one paragraph block below focus -->
    <rect x="82" y="468" rx="2" width="240" height="6" fill="#D1D5DB"/>
    <rect x="82" y="484" rx="2" width="190" height="6" fill="#D1D5DB"/>

    <rect x="82" y="540" rx="2" width="220" height="6" fill="#D1D5DB"/>
  </g>

  <!-- Broadcaster (front layer, right) — wider frame, content centered with breathing room on both sides -->
  <g filter="url(#sh)">
    <rect x="283" y="140" width="425" height="520" rx="14" fill="#FFFFFF" stroke="#E5E7EB"/>
    <path d="M 283 154 a14 14 0 0 1 14 -14 h397 a14 14 0 0 1 14 14 v18 h-425 z" fill="#F8F9FA"/>
    <line x1="283" y1="172" x2="708" y2="172" stroke="#E5E7EB"/>
    <circle cx="305" cy="159" r="5" fill="#FF5F57"/>
    <circle cx="321" cy="159" r="5" fill="#FEBC2E"/>
    <circle cx="337" cy="159" r="5" fill="#28C840"/>

    <!-- title (left-aligned to the content column, matching the follower) -->
    <rect x="345" y="202" rx="3" width="200" height="14" fill="#4B5563"/>

    <!-- focused paragraph — the broadcaster's own selection (light blue, distinct from the orange pulse it emits) -->
    <rect x="345" y="284" width="300" height="58" rx="10" fill="none" stroke="#60A5FA" stroke-width="1.5"/>
    <rect x="363" y="302" rx="2" width="260" height="6" fill="#9CA3AF"/>
    <rect x="363" y="316" rx="2" width="220" height="6" fill="#9CA3AF"/>

    <!-- below focus: indent reduced; right edge still aligned with other paragraphs (645) -->
    <rect x="370" y="386" rx="2" width="275" height="6" fill="#D1D5DB"/>
    <rect x="370" y="400" rx="2" width="235" height="6" fill="#D1D5DB"/>

    <rect x="370" y="446" rx="2" width="275" height="6" fill="#D1D5DB"/>
    <rect x="370" y="460" rx="2" width="210" height="6" fill="#D1D5DB"/>

    <!-- once the pulse falls behind, content returns to full width — centred -->
    <rect x="345" y="520" rx="2" width="300" height="6" fill="#D1D5DB"/>
    <rect x="345" y="534" rx="2" width="220" height="6" fill="#D1D5DB"/>

    <rect x="345" y="588" rx="2" width="270" height="6" fill="#D1D5DB"/>
    <rect x="345" y="602" rx="2" width="190" height="6" fill="#D1D5DB"/>
  </g>

  <!-- Broadcast pulse — 3 rings, 2px stroke, fading outward; nudged toward the lower-left whitespace -->
  <g pointer-events="none">
    <circle cx="310" cy="365" r="200" fill="none" stroke="#FF8A3D" stroke-width="2" opacity="0.25"/>
    <circle cx="310" cy="365" r="130" fill="none" stroke="#FF8A3D" stroke-width="2" opacity="0.5"/>
    <circle cx="310" cy="365" r="70" fill="none" stroke="#FF8A3D" stroke-width="2" opacity="0.85"/>
    <circle cx="310" cy="365" r="20" fill="#F59E0B"/>
  </g>
</svg>
