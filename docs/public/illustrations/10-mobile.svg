<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.10"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="800" fill="#FAFAF7"/>

  <!-- QR matrix (back layer, left). 13x13 cells, scaled 1.4x → 16.8px cells, 218×218 footprint -->
  <g transform="translate(200 320) scale(1.4)" fill="#1F2937">
    <!-- finder top-left -->
    <rect x="0" y="0" width="36" height="36"/>
    <rect x="12" y="12" width="12" height="12" fill="#FAFAF7"/>
    <!-- finder top-right -->
    <rect x="120" y="0" width="36" height="36"/>
    <rect x="132" y="12" width="12" height="12" fill="#FAFAF7"/>
    <!-- finder bottom-left -->
    <rect x="0" y="120" width="36" height="36"/>
    <rect x="12" y="132" width="12" height="12" fill="#FAFAF7"/>

    <rect x="48" y="0" width="12" height="12"/>
    <rect x="72" y="0" width="12" height="12"/>
    <rect x="96" y="0" width="12" height="12"/>
    <rect x="60" y="12" width="12" height="12"/>
    <rect x="84" y="12" width="12" height="12"/>
    <rect x="108" y="12" width="12" height="12"/>
    <rect x="48" y="24" width="12" height="12"/>
    <rect x="84" y="24" width="12" height="12"/>
    <rect x="108" y="24" width="12" height="12"/>

    <rect x="12" y="36" width="12" height="12"/>
    <rect x="0" y="48" width="12" height="12"/>
    <rect x="24" y="48" width="12" height="12"/>
    <rect x="12" y="60" width="12" height="12"/>
    <rect x="24" y="72" width="12" height="12"/>
    <rect x="0" y="84" width="12" height="12"/>
    <rect x="12" y="96" width="12" height="12"/>
    <rect x="24" y="108" width="12" height="12"/>

    <rect x="48" y="36" width="12" height="12"/>
    <rect x="72" y="36" width="12" height="12"/>
    <rect x="96" y="36" width="12" height="12"/>
    <rect x="120" y="36" width="12" height="12"/>
    <rect x="144" y="36" width="12" height="12"/>

    <rect x="36" y="48" width="12" height="12"/>
    <rect x="60" y="48" width="12" height="12"/>
    <rect x="96" y="48" width="12" height="12"/>
    <rect x="132" y="48" width="12" height="12"/>

    <rect x="48" y="60" width="12" height="12"/>
    <rect x="84" y="60" width="12" height="12"/>
    <rect x="108" y="60" width="12" height="12"/>
    <rect x="120" y="60" width="12" height="12"/>
    <rect x="144" y="60" width="12" height="12"/>

    <rect x="60" y="72" width="12" height="12"/>
    <rect x="72" y="72" width="12" height="12"/>
    <rect x="96" y="72" width="12" height="12"/>
    <rect x="132" y="72" width="12" height="12"/>

    <rect x="48" y="84" width="12" height="12"/>
    <rect x="84" y="84" width="12" height="12"/>
    <rect x="120" y="84" width="12" height="12"/>
    <rect x="144" y="84" width="12" height="12"/>

    <rect x="36" y="96" width="12" height="12"/>
    <rect x="72" y="96" width="12" height="12"/>
    <rect x="96" y="96" width="12" height="12"/>
    <rect x="132" y="96" width="12" height="12"/>

    <rect x="48" y="108" width="12" height="12"/>
    <rect x="84" y="108" width="12" height="12"/>
    <rect x="108" y="108" width="12" height="12"/>
    <rect x="144" y="108" width="12" height="12"/>

    <rect x="48" y="120" width="12" height="12"/>
    <rect x="72" y="120" width="12" height="12"/>
    <rect x="108" y="120" width="12" height="12"/>
    <rect x="132" y="120" width="12" height="12"/>
    <rect x="144" y="120" width="12" height="12"/>

    <rect x="36" y="132" width="12" height="12"/>
    <rect x="60" y="132" width="12" height="12"/>
    <rect x="84" y="132" width="12" height="12"/>
    <rect x="120" y="132" width="12" height="12"/>
    <rect x="144" y="132" width="12" height="12"/>

    <rect x="48" y="144" width="12" height="12"/>
    <rect x="72" y="144" width="12" height="12"/>
    <rect x="96" y="144" width="12" height="12"/>
    <rect x="120" y="144" width="12" height="12"/>
    <rect x="144" y="144" width="12" height="12"/>
  </g>

  <!-- Phone (front layer, overlapping QR), tilted 8° clockwise as if just held up after scanning -->
  <g filter="url(#sh)" transform="rotate(8 495 400) translate(360 130) scale(1.125) translate(-430 -170)">
    <rect x="437" y="177" width="226" height="466" rx="30" fill="#1F2937"/>
    <rect x="441" y="181" width="218" height="458" rx="26" fill="#FFFFFF"/>

    <!-- page content: brand-green accents on a calm grey paragraph rhythm -->
    <!-- title -->
    <rect x="457" y="216" rx="3" width="130" height="14" fill="#27ae60"/>
    <rect x="457" y="238" rx="2" width="80" height="6" fill="#9CA3AF"/>

    <!-- paragraph block -->
    <rect x="457" y="276" rx="2" width="186" height="6" fill="#9CA3AF"/>
    <rect x="457" y="288" rx="2" width="160" height="6" fill="#9CA3AF"/>
    <rect x="457" y="300" rx="2" width="186" height="6" fill="#9CA3AF"/>
    <rect x="457" y="312" rx="2" width="124" height="6" fill="#9CA3AF"/>

    <!-- code block -->
    <rect x="457" y="344" rx="6" width="186" height="62" fill="#F3F4F6"/>
    <rect x="469" y="358" rx="2" width="48" height="5" fill="#27ae60"/>
    <rect x="523" y="358" rx="2" width="98" height="5" fill="#9CA3AF"/>
    <rect x="469" y="372" rx="2" width="140" height="5" fill="#6B7280"/>
    <rect x="469" y="386" rx="2" width="60" height="5" fill="#27ae60"/>
    <rect x="535" y="386" rx="2" width="86" height="5" fill="#9CA3AF"/>

    <!-- section heading -->
    <rect x="457" y="430" rx="2" width="80" height="10" fill="#27ae60"/>

    <!-- viewed checklist (signature Markon detail) -->
    <circle cx="464" cy="468" r="7" fill="#27ae60"/>
    <path d="M 460 468 L 463 471 L 469 465" stroke="#FFFFFF" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="478" y="465" rx="2" width="140" height="6" fill="#9CA3AF"/>

    <circle cx="464" cy="490" r="7" fill="#27ae60"/>
    <path d="M 460 490 L 463 493 L 469 487" stroke="#FFFFFF" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="478" y="487" rx="2" width="110" height="6" fill="#9CA3AF"/>

    <circle cx="464" cy="512" r="6.5" fill="none" stroke="#D1D5DB" stroke-width="1.4"/>
    <rect x="478" y="509" rx="2" width="130" height="6" fill="#9CA3AF"/>

    <!-- closing paragraph -->
    <rect x="457" y="548" rx="2" width="186" height="6" fill="#9CA3AF"/>
    <rect x="457" y="560" rx="2" width="156" height="6" fill="#9CA3AF"/>
    <rect x="457" y="572" rx="2" width="186" height="6" fill="#9CA3AF"/>
    <rect x="457" y="584" rx="2" width="120" height="6" fill="#9CA3AF"/>
  </g>
</svg>
